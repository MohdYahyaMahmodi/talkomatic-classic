<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkoBrowser</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        --accent: #4cc2ff;
        --accent-dim: #0078d4;
        --accent-soft: rgba(76, 194, 255, 0.16);
        --mica: rgba(32, 32, 34, 0.82);
        --mica-solid: #202022;
        --surface-2: rgba(255, 255, 255, 0.052);
        --surface-3: rgba(255, 255, 255, 0.09);
        --card: rgba(255, 255, 255, 0.045);
        --stroke: rgba(255, 255, 255, 0.075);
        --stroke-strong: rgba(255, 255, 255, 0.12);
        --t1: #ffffff;
        --t2: rgba(255, 255, 255, 0.66);
        --t3: rgba(255, 255, 255, 0.36);
        --shadow: 0 24px 56px rgba(0, 0, 0, 0.52);
        --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.38);
        --tb-h: 48px;
        --r: 8px;
      }
      [data-theme="light"] {
        --mica: rgba(243, 243, 245, 0.85);
        --mica-solid: #f3f3f5;
        --surface-2: rgba(0, 0, 0, 0.038);
        --surface-3: rgba(0, 0, 0, 0.07);
        --card: rgba(255, 255, 255, 0.62);
        --stroke: rgba(0, 0, 0, 0.07);
        --stroke-strong: rgba(0, 0, 0, 0.12);
        --t1: #1b1b1c;
        --t2: rgba(27, 27, 28, 0.62);
        --t3: rgba(27, 27, 28, 0.34);
        --shadow: 0 24px 56px rgba(0, 0, 0, 0.26);
        --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.16);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ::selection {
        background: var(--accent-soft);
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          "Segoe UI Variable Text",
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 13px;
        color: var(--t1);
        background: #000;
        user-select: none;
        cursor: default;
        -webkit-font-smoothing: antialiased;
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: default;
      }
      input,
      textarea {
        font: inherit;
        color: inherit;
        outline: none;
      }
      img {
        -webkit-user-drag: none;
        user-select: none;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 134, 0.38);
        border-radius: 6px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(128, 128, 134, 0.6);
        background-clip: content-box;
        border: 3px solid transparent;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* ============ Boot ============ */
      #boot {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        transition: opacity 0.7s;
      }
      #boot .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      #boot .tk-logo {
        width: 52px;
        height: 52px;
      }
      #boot .brand span {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 0.5px;
        color: #fff;
      }
      #boot .spin {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.16);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .tk-logo {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 9%;
      }
      .tk-logo i {
        border-radius: 14%;
      }
      .tk-logo i:nth-child(1) {
        background: #4cc2ff;
      }
      .tk-logo i:nth-child(2) {
        background: #9ad9ff;
      }
      .tk-logo i:nth-child(3) {
        background: #0078d4;
      }
      .tk-logo i:nth-child(4) {
        background: #4cc2ff;
      }

      /* ============ Desktop ============ */
      #wallpaper {
        position: fixed;
        inset: 0;
        background-size: cover;
        background-position: center;
        transition:
          background-image 0.45s,
          filter 0.25s;
      }
      #desktop {
        position: fixed;
        inset: 0 0 var(--tb-h) 0;
      }
      #snap-preview {
        position: fixed;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
        border-radius: var(--r);
        z-index: 90;
        display: none;
        backdrop-filter: blur(4px);
        transition: all 0.12s ease;
      }

      /* ============ Taskbar ============ */
      #taskbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: var(--tb-h);
        z-index: 5000;
        background: var(--mica);
        backdrop-filter: blur(36px) saturate(1.5);
        -webkit-backdrop-filter: blur(36px) saturate(1.5);
        display: flex;
        align-items: center;
        padding: 0 10px;
        box-shadow: 0 -1px 0 var(--stroke);
      }
      #tb-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 4px;
        height: 100%;
      }
      .tb-btn {
        position: relative;
        width: 44px;
        height: 40px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        color: var(--t1);
        transition: background 0.12s;
      }
      .tb-btn:hover {
        background: var(--surface-3);
      }
      .tb-btn:active {
        background: var(--surface-2);
      }
      .tb-btn:active .icon-img,
      .tb-btn:active .tk-logo {
        transform: scale(0.85);
      }
      .tb-btn .pip {
        position: absolute;
        bottom: 3px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 3px;
        border-radius: 2px;
        background: var(--t3);
        opacity: 0;
        transition: 0.18s;
      }
      .tb-btn.running .pip {
        opacity: 1;
      }
      .tb-btn.active-app .pip {
        width: 16px;
        background: var(--accent);
      }
      .tb-btn .tk-logo {
        width: 22px;
        height: 22px;
        transition: transform 0.1s;
      }
      .icon-img {
        width: 26px;
        height: 26px;
        object-fit: contain;
        transition: transform 0.1s;
        pointer-events: none;
      }
      .icon-fall {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #fff;
        pointer-events: none;
      }
      #tb-search {
        display: flex;
        align-items: center;
        gap: 9px;
        height: 34px;
        padding: 0 14px 0 12px;
        margin-left: 4px;
        border-radius: 17px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        color: var(--t2);
        font-size: 12.5px;
        min-width: 170px;
      }
      #tb-search:hover {
        background: var(--surface-3);
      }
      #tb-tray {
        margin-left: auto;
        display: flex;
        align-items: center;
        height: 100%;
        gap: 2px;
      }
      .tray-group {
        display: flex;
        align-items: center;
        gap: 9px;
        height: 36px;
        padding: 0 10px;
        border-radius: 6px;
        font-size: 13px;
      }
      .tray-group:hover {
        background: var(--surface-3);
      }
      #tb-clock {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        height: 36px;
        padding: 0 10px;
        border-radius: 6px;
        font-size: 11.5px;
        line-height: 1.35;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #tb-clock:hover {
        background: var(--surface-3);
      }
      #tb-showdesk {
        width: 8px;
        height: 100%;
        margin-left: 4px;
        border-left: 1px solid var(--stroke);
      }
      #tb-showdesk:hover {
        border-left-color: var(--accent);
      }

      /* ============ Flyouts ============ */
      .flyout {
        position: fixed;
        z-index: 6000;
        background: var(--mica);
        backdrop-filter: blur(40px) saturate(1.6);
        -webkit-backdrop-filter: blur(40px) saturate(1.6);
        border: 1px solid var(--stroke-strong);
        border-radius: 10px;
        box-shadow: var(--shadow);
        animation: rise 0.18s cubic-bezier(0.1, 0.9, 0.2, 1);
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      #start {
        width: 560px;
        padding: 24px 28px 0;
        display: none;
        flex-direction: column;
      }
      #start.show {
        display: flex;
      }
      #start-search {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 38px;
        padding: 0 14px;
        border-radius: 19px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        border-bottom: 1px solid var(--stroke-strong);
        margin-bottom: 24px;
      }
      #start-search i {
        color: var(--t2);
        font-size: 13px;
      }
      #start-search input {
        flex: 1;
        background: none;
        border: none;
        font-size: 13px;
      }
      #start-search input::placeholder {
        color: var(--t3);
      }
      .start-label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 14px;
      }
      #start-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
        margin-bottom: 22px;
      }
      .start-app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 10px 4px 8px;
        border-radius: 6px;
        font-size: 11.5px;
        text-align: center;
      }
      .start-app:hover {
        background: var(--surface-3);
      }
      .start-app .icon-img,
      .start-app .icon-fall {
        width: 32px;
        height: 32px;
        font-size: 15px;
        border-radius: 7px;
      }
      #start-rec-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        margin-bottom: 10px;
      }
      .rec-item {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12.5px;
        text-align: left;
      }
      .rec-item:hover {
        background: var(--surface-3);
      }
      .rec-item .ri {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
        font-size: 13px;
        flex: none;
      }
      .rec-item .sub {
        font-size: 11px;
        color: var(--t3);
      }
      #start-foot {
        display: flex;
        align-items: center;
        margin: 8px -28px 0;
        padding: 12px 28px;
        border-top: 1px solid var(--stroke);
        background: var(--surface-2);
      }
      #start-user {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12.5px;
      }
      #start-user:hover {
        background: var(--surface-3);
      }
      #start-user .avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--accent-dim);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
      }
      #start-power {
        margin-left: auto;
        width: 38px;
        height: 38px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      #start-power:hover {
        background: var(--surface-3);
      }

      #quick {
        width: 340px;
        padding: 20px;
        display: none;
        flex-direction: column;
        gap: 18px;
      }
      #quick.show {
        display: flex;
      }
      #quick-toggles {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .q-toggle {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .q-toggle .q-btn {
        height: 48px;
        border-radius: 6px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        transition: 0.12s;
      }
      .q-toggle .q-btn:hover {
        background: var(--surface-3);
      }
      .q-toggle.on .q-btn {
        background: var(--accent-dim);
        border-color: transparent;
        color: #fff;
      }
      .q-toggle span {
        font-size: 11px;
        text-align: center;
        color: var(--t2);
      }
      .q-slider {
        display: flex;
        align-items: center;
        gap: 13px;
        font-size: 14px;
        color: var(--t2);
      }
      .q-slider input[type="range"] {
        flex: 1;
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--surface-3);
        cursor: pointer;
      }
      .q-slider input::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
        border: 4px solid var(--mica-solid);
      }

      #calfly {
        width: 320px;
        padding: 18px 20px;
        display: none;
      }
      #calfly.show {
        display: block;
      }
      #cal-head {
        display: flex;
        align-items: center;
        margin-bottom: 14px;
        font-weight: 600;
        font-size: 13.5px;
      }
      #cal-head .nav {
        margin-left: auto;
        display: flex;
        gap: 2px;
      }
      #cal-head .nav button {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        color: var(--t2);
        font-size: 11px;
      }
      #cal-head .nav button:hover {
        background: var(--surface-3);
      }
      #cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
        text-align: center;
      }
      #cal-grid .dow {
        font-size: 11px;
        color: var(--t3);
        padding: 5px 0;
      }
      #cal-grid .day {
        font-size: 12px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #cal-grid .day:hover {
        background: var(--surface-3);
      }
      #cal-grid .day.dim {
        color: var(--t3);
      }
      #cal-grid .day.today {
        background: var(--accent-dim);
        color: #fff;
        font-weight: 600;
      }

      /* Context menu */
      .cmenu {
        position: fixed;
        min-width: 230px;
        z-index: 7000;
        padding: 5px;
        background: var(--mica);
        backdrop-filter: blur(40px) saturate(1.6);
        -webkit-backdrop-filter: blur(40px) saturate(1.6);
        border: 1px solid var(--stroke-strong);
        border-radius: 9px;
        box-shadow: var(--shadow-sm);
        animation: cm 0.1s ease;
      }
      @keyframes cm {
        from {
          opacity: 0;
          transform: scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .cm-item {
        display: flex;
        align-items: center;
        gap: 11px;
        width: 100%;
        padding: 7px 11px;
        border-radius: 5px;
        font-size: 12.5px;
        text-align: left;
      }
      .cm-item i {
        width: 16px;
        text-align: center;
        color: var(--t2);
        font-size: 12px;
      }
      .cm-item img {
        width: 16px;
        height: 16px;
        object-fit: contain;
      }
      .cm-item:hover {
        background: var(--surface-3);
      }
      .cm-item .kbd {
        margin-left: auto;
        font-size: 11px;
        color: var(--t3);
      }
      .cm-sep {
        height: 1px;
        background: var(--stroke);
        margin: 5px 9px;
      }
      .cm-item.disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ============ Windows ============ */
      .window {
        position: absolute;
        min-width: 420px;
        min-height: 280px;
        background: var(--mica);
        backdrop-filter: blur(40px) saturate(1.5);
        -webkit-backdrop-filter: blur(40px) saturate(1.5);
        border: 1px solid var(--stroke-strong);
        border-radius: var(--r);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .window.opening {
        animation: winin 0.16s cubic-bezier(0.1, 0.9, 0.2, 1);
      }
      @keyframes winin {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .window.closing {
        transition: 0.14s;
        opacity: 0;
        transform: scale(0.97);
      }
      .window.minimized {
        transition: 0.18s;
        opacity: 0;
        transform: scale(0.9) translateY(40vh);
        pointer-events: none;
      }
      .window.maxed {
        border-radius: 0;
        border: none;
      }
      .window:not(.focused) {
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
      }
      .window:not(.focused) .titlebar {
        color: var(--t3);
      }
      .window.focused .titlebar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent-soft),
          transparent
        );
      }
      .titlebar {
        height: 36px;
        flex: none;
        display: flex;
        align-items: center;
        padding-left: 13px;
        gap: 9px;
        font-size: 12px;
        position: relative;
      }
      .titlebar .icon-img,
      .titlebar .icon-fall {
        width: 16px;
        height: 16px;
        font-size: 8.5px;
        border-radius: 4px;
        flex: none;
      }
      .titlebar .tt {
        color: var(--t2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
      }
      .win-controls {
        margin-left: auto;
        display: flex;
        align-self: stretch;
      }
      .win-controls button {
        width: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--t1);
        transition: background 0.1s;
      }
      .win-controls button:hover {
        background: var(--surface-3);
      }
      .win-controls .wc-close:hover {
        background: #c42b1c;
        color: #fff;
      }
      .win-body {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }
      .rz {
        position: absolute;
        z-index: 10;
      }
      .rz-e {
        right: -3px;
        top: 8px;
        bottom: 8px;
        width: 7px;
        cursor: ew-resize;
      }
      .rz-s {
        bottom: -3px;
        left: 8px;
        right: 8px;
        height: 7px;
        cursor: ns-resize;
      }
      .rz-w {
        left: -3px;
        top: 8px;
        bottom: 8px;
        width: 7px;
        cursor: ew-resize;
      }
      .rz-n {
        top: -3px;
        left: 8px;
        right: 8px;
        height: 7px;
        cursor: ns-resize;
      }
      .rz-se {
        right: -4px;
        bottom: -4px;
        width: 13px;
        height: 13px;
        cursor: nwse-resize;
      }
      .rz-sw {
        left: -4px;
        bottom: -4px;
        width: 13px;
        height: 13px;
        cursor: nesw-resize;
      }
      .rz-ne {
        right: -4px;
        top: -4px;
        width: 13px;
        height: 13px;
        cursor: nesw-resize;
      }
      .rz-nw {
        left: -4px;
        top: -4px;
        width: 13px;
        height: 13px;
        cursor: nwse-resize;
      }

      /* ============ Toasts ============ */
      #toasts {
        position: fixed;
        right: 14px;
        bottom: 60px;
        z-index: 8000;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
      }
      .toast {
        width: 344px;
        padding: 14px 16px;
        display: flex;
        gap: 13px;
        border-radius: 9px;
        background: var(--mica);
        backdrop-filter: blur(40px);
        border: 1px solid var(--stroke-strong);
        box-shadow: var(--shadow-sm);
        animation: rise 0.22s cubic-bezier(0.1, 0.9, 0.2, 1);
      }
      .toast .icon-img,
      .toast .icon-fall {
        width: 28px;
        height: 28px;
        font-size: 13px;
        flex: none;
      }
      .toast b {
        font-size: 12.5px;
        display: block;
      }
      .toast p {
        font-size: 12px;
        color: var(--t2);
        margin-top: 2px;
        line-height: 1.45;
      }

      /* ============ Shared app chrome ============ */
      .fill {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .navrail {
        width: 218px;
        flex: none;
        display: flex;
        flex-direction: column;
        padding: 8px;
        gap: 1px;
        overflow-y: auto;
        border-right: 1px solid var(--stroke);
      }
      .rail-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-radius: 5px;
        font-size: 12.5px;
        position: relative;
        text-align: left;
      }
      .rail-item i {
        width: 16px;
        text-align: center;
        font-size: 13px;
        color: var(--t2);
      }
      .rail-item:hover {
        background: var(--surface-3);
      }
      .rail-item.active {
        background: var(--surface-3);
      }
      .rail-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 16px;
        border-radius: 2px;
        background: var(--accent);
      }
      .rail-head {
        font-size: 11px;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 12px 12px 6px;
      }
      .ibtn {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12.5px;
        color: var(--t1);
        flex: none;
      }
      .ibtn:hover {
        background: var(--surface-3);
      }
      .ibtn:active {
        background: var(--surface-2);
      }
      .ibtn.dis {
        opacity: 0.35;
        pointer-events: none;
      }
      .ibtn.tog {
        color: var(--accent);
      }

      /* ============ TalkoWeb (browser) ============ */
      .brw {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .brw-tabstrip {
        flex: none;
        display: flex;
        align-items: flex-end;
        padding: 6px 8px 0;
        gap: 1px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .brw-tabstrip::-webkit-scrollbar {
        display: none;
      }
      .brw-tab {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 34px;
        min-width: 120px;
        max-width: 220px;
        padding: 0 8px 0 11px;
        border-radius: 8px 8px 0 0;
        font-size: 12px;
        color: var(--t2);
        flex: 1 1 160px;
        position: relative;
      }
      .brw-tab:hover {
        background: var(--surface-2);
      }
      .brw-tab.on {
        background: var(--surface-3);
        color: var(--t1);
      }
      .brw-tab .fav {
        width: 15px;
        height: 15px;
        flex: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--t3);
      }
      .brw-tab .fav img {
        width: 15px;
        height: 15px;
        border-radius: 3px;
      }
      .brw-tab span.lbl {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .brw-tab .tx {
        width: 19px;
        height: 19px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8.5px;
        color: var(--t3);
        flex: none;
      }
      .brw-tab .tx:hover {
        background: var(--surface-3);
        color: var(--t1);
      }
      .brw-tab .loadbar {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 0;
        height: 2px;
        border-radius: 1px;
        background: var(--accent);
        transform-origin: left;
        animation: loading 1.1s ease infinite;
        display: none;
      }
      .brw-tab.loading .loadbar {
        display: block;
      }
      @keyframes loading {
        0% {
          transform: scaleX(0.05);
        }
        60% {
          transform: scaleX(0.7);
        }
        100% {
          transform: scaleX(0.05);
        }
      }
      .brw-addtab {
        width: 28px;
        height: 28px;
        margin: 0 0 3px 3px;
        border-radius: 6px;
        font-size: 11px;
        color: var(--t2);
        flex: none;
      }
      .brw-addtab:hover {
        background: var(--surface-3);
      }
      .brw-navbar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 7px 10px;
        border-bottom: 1px solid var(--stroke);
      }
      .brw-omni {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 9px;
        height: 34px;
        padding: 0 6px 0 13px;
        border-radius: 17px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
      }
      .brw-omni:focus-within {
        border-color: var(--accent);
        background: var(--mica-solid);
      }
      .brw-omni .sec {
        font-size: 10.5px;
        color: var(--t3);
      }
      .brw-omni input {
        flex: 1;
        background: none;
        border: none;
        font-size: 12.5px;
        user-select: text;
      }
      .brw-omni .star {
        width: 26px;
        height: 26px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--t2);
      }
      .brw-omni .star:hover {
        background: var(--surface-3);
      }
      .brw-omni .star.marked {
        color: var(--accent);
      }
      .brw-bmbar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 4px 10px;
        border-bottom: 1px solid var(--stroke);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .brw-bmbar::-webkit-scrollbar {
        display: none;
      }
      .bm-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        height: 26px;
        padding: 0 10px;
        border-radius: 5px;
        font-size: 11.5px;
        color: var(--t2);
        white-space: nowrap;
        flex: none;
      }
      .bm-chip:hover {
        background: var(--surface-3);
        color: var(--t1);
      }
      .bm-chip img {
        width: 14px;
        height: 14px;
        border-radius: 3px;
      }
      .brw-view {
        flex: 1;
        position: relative;
        background: #fff;
      }
      .brw-view .tab-holder {
        position: absolute;
        inset: 0;
      }
      .brw-view iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
        transform-origin: 0 0;
      }
      .brw-ntp {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 9vh;
        background: var(--mica-solid);
        overflow-y: auto;
      }
      .brw-ntp .ntp-clock {
        font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
        font-size: 56px;
        font-weight: 200;
        letter-spacing: -1px;
        font-variant-numeric: tabular-nums;
      }
      .brw-ntp .ntp-date {
        color: var(--t2);
        font-size: 13.5px;
        margin: 2px 0 34px;
      }
      .brw-ntp .ntp-search {
        width: min(560px, 84%);
        display: flex;
        align-items: center;
        gap: 12px;
        height: 46px;
        padding: 0 20px;
        border-radius: 23px;
        background: var(--surface-2);
        border: 1px solid var(--stroke-strong);
        margin-bottom: 42px;
      }
      .brw-ntp .ntp-search:focus-within {
        border-color: var(--accent);
      }
      .brw-ntp .ntp-search i {
        color: var(--t3);
      }
      .brw-ntp .ntp-search input {
        flex: 1;
        background: none;
        border: none;
        font-size: 14px;
        user-select: text;
      }
      .ntp-tiles {
        display: grid;
        grid-template-columns: repeat(4, 96px);
        gap: 18px;
        padding-bottom: 30px;
      }
      .ntp-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 9px;
        padding: 12px 4px;
        border-radius: 9px;
        font-size: 11.5px;
        color: var(--t2);
        text-align: center;
      }
      .ntp-tile:hover {
        background: var(--surface-2);
      }
      .ntp-tile .bub {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--surface-3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ntp-tile img {
        width: 22px;
        height: 22px;
        border-radius: 4px;
      }

      /* ============ Notepad ============ */
      .np-tabs {
        flex: none;
        display: flex;
        align-items: center;
        gap: 1px;
        padding: 6px 8px 0;
        border-bottom: 1px solid var(--stroke);
      }
      .np-tab {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 8px 0 12px;
        border-radius: 7px 7px 0 0;
        font-size: 12px;
        color: var(--t2);
        max-width: 190px;
      }
      .np-tab.on {
        background: var(--surface-3);
        color: var(--t1);
      }
      .np-tab:hover:not(.on) {
        background: var(--surface-2);
      }
      .np-tab span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .np-tab .tx {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        font-size: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t3);
      }
      .np-tab .tx:hover {
        background: var(--surface-3);
        color: var(--t1);
      }
      .np-add {
        width: 26px;
        height: 26px;
        border-radius: 5px;
        color: var(--t2);
        font-size: 11px;
        margin-bottom: 3px;
      }
      .np-add:hover {
        background: var(--surface-3);
      }
      .np-area {
        flex: 1;
        background: none;
        border: none;
        resize: none;
        padding: 18px 22px;
        font:
          13.5px/1.7 "Segoe UI",
          system-ui,
          sans-serif;
        color: var(--t1);
        user-select: text;
      }
      .np-area.mono {
        font-family:
          "Cascadia Mono", "Cascadia Code", Consolas, ui-monospace, monospace;
        font-size: 12.5px;
      }
      .np-status {
        flex: none;
        height: 26px;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 14px;
        border-top: 1px solid var(--stroke);
        font-size: 11px;
        color: var(--t2);
      }
      .np-status .right {
        margin-left: auto;
        display: flex;
        gap: 18px;
      }

      /* ============ Terminal ============ */
      .term {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
        font:
          12.5px/1.5 "Cascadia Mono",
          "Cascadia Code",
          Consolas,
          ui-monospace,
          monospace;
        background: rgba(12, 12, 14, 0.6);
        user-select: text;
      }
      [data-theme="light"] .term {
        background: rgba(255, 255, 255, 0.5);
      }
      .term .ln {
        white-space: pre-wrap;
        word-break: break-all;
      }
      .term .ps {
        color: #3ee08c;
      }
      .term .pth {
        color: var(--accent);
      }
      .term .dim {
        color: var(--t2);
      }
      .term .err {
        color: #ff7a72;
      }
      .term-row {
        display: flex;
      }
      .term-in {
        background: none;
        border: none;
        font: inherit;
        color: var(--t1);
        flex: 1;
        user-select: text;
      }

      /* ============ Settings ============ */
      .set-page {
        flex: 1;
        overflow-y: auto;
        padding: 28px 34px;
      }
      .set-h1 {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 22px;
        font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
      }
      .set-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 16px;
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: 6px;
        margin-bottom: 5px;
        min-height: 58px;
      }
      .set-card > i {
        width: 20px;
        text-align: center;
        font-size: 16px;
        color: var(--t2);
      }
      .set-card .lab {
        font-size: 13px;
      }
      .set-card .sub {
        font-size: 11.5px;
        color: var(--t2);
        margin-top: 1px;
      }
      .set-card .end {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sel {
        appearance: none;
        background: var(--surface-2);
        border: 1px solid var(--stroke-strong);
        color: var(--t1);
        padding: 6px 28px 6px 12px;
        border-radius: 5px;
        font-size: 12.5px;
        cursor: pointer;
      }
      .toggle {
        width: 42px;
        height: 21px;
        border-radius: 11px;
        background: transparent;
        border: 1px solid var(--t3);
        position: relative;
        flex: none;
        transition: 0.15s;
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--t2);
        transition: 0.18s cubic-bezier(0.2, 1.2, 0.4, 1);
      }
      .toggle.on {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
      }
      .toggle.on::after {
        background: #fff;
        transform: translateX(21px);
      }
      .swatches {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .swatch {
        width: 26px;
        height: 26px;
        border-radius: 5px;
        border: 2px solid transparent;
        padding: 0;
      }
      .swatch.on {
        border-color: var(--t1);
      }
      .wp-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        width: 100%;
      }
      .wp-th {
        aspect-ratio: 16/10;
        border-radius: 6px;
        background-size: cover;
        background-position: center;
        border: 2px solid transparent;
        padding: 0;
        outline: 1px solid var(--stroke-strong);
      }
      .wp-th.on {
        border-color: var(--accent);
      }
      .set-section {
        margin: 22px 0 10px;
        font-size: 14px;
        font-weight: 600;
      }

      /* ============ Calculator ============ */
      .calc {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .calc-hist {
        flex: none;
        text-align: right;
        padding: 14px 18px 0;
        font-size: 13px;
        color: var(--t3);
        height: 32px;
        white-space: nowrap;
        overflow: hidden;
        font-variant-numeric: tabular-nums;
      }
      .calc-disp {
        flex: none;
        text-align: right;
        padding: 0 16px 8px;
        font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
        font-size: 44px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        min-height: 66px;
        font-variant-numeric: tabular-nums;
      }
      .calc-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
        padding: 4px 6px 6px;
      }
      .calc-grid button {
        border-radius: 5px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        font-size: 15px;
        transition: filter 0.08s;
      }
      .calc-grid button:hover {
        background: var(--surface-3);
      }
      .calc-grid button:active {
        filter: brightness(1.4);
      }
      [data-theme="light"] .calc-grid button:active {
        filter: brightness(0.9);
      }
      .calc-grid .num {
        background: var(--surface-3);
        font-weight: 600;
      }
      .calc-grid .eq {
        background: var(--accent);
        border-color: transparent;
        color: #0b2436;
        font-weight: 600;
        font-size: 17px;
      }

      /* ============ Explorer ============ */
      .exp-bar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 7px 10px;
        border-bottom: 1px solid var(--stroke);
      }
      .exp-crumbs {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 3px;
        height: 32px;
        padding: 0 10px;
        border-radius: 5px;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        font-size: 12px;
        overflow: hidden;
        white-space: nowrap;
      }
      .exp-crumbs .crumb {
        padding: 3px 7px;
        border-radius: 4px;
        color: var(--t1);
      }
      .exp-crumbs .crumb:hover {
        background: var(--surface-3);
      }
      .exp-crumbs i {
        font-size: 8px;
        color: var(--t3);
      }
      .exp-head {
        display: grid;
        grid-template-columns: 1fr 130px 110px;
        gap: 10px;
        padding: 7px 20px;
        font-size: 11px;
        color: var(--t3);
        border-bottom: 1px solid var(--stroke);
      }
      .exp-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 10px;
      }
      .exp-row {
        display: grid;
        grid-template-columns: 1fr 130px 110px;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        border-radius: 5px;
        font-size: 12.5px;
      }
      .exp-row:hover {
        background: var(--surface-2);
      }
      .exp-row.sel {
        background: var(--accent-soft);
      }
      .exp-row .nm {
        display: flex;
        align-items: center;
        gap: 11px;
        overflow: hidden;
      }
      .exp-row .nm img {
        width: 18px;
        height: 18px;
        object-fit: contain;
        flex: none;
      }
      .exp-row .nm i {
        width: 18px;
        text-align: center;
        font-size: 15px;
        color: var(--t2);
        flex: none;
      }
      .exp-row .nm span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .exp-row .meta {
        color: var(--t2);
        font-size: 11.5px;
      }
      .exp-status {
        flex: none;
        height: 25px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        font-size: 11px;
        color: var(--t2);
        border-top: 1px solid var(--stroke);
      }

      /* ============ Paint ============ */
      .paint {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .paint-bar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-bottom: 1px solid var(--stroke);
        flex-wrap: wrap;
      }
      .paint-swatches {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .p-swatch {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid transparent;
        padding: 0;
        box-shadow: 0 0 0 1px var(--stroke-strong);
      }
      .p-swatch.on {
        border-color: var(--t1);
      }
      .paint-bar input[type="color"] {
        width: 26px;
        height: 26px;
        border: none;
        background: none;
        padding: 0;
        border-radius: 5px;
        cursor: pointer;
      }
      .paint-bar input[type="range"] {
        width: 90px;
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--surface-3);
      }
      .paint-bar input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
      }
      .paint-canvas-wrap {
        flex: 1;
        position: relative;
        background: #2a2a2c;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-theme="light"] .paint-canvas-wrap {
        background: #dcdce0;
      }
      .paint-canvas-wrap canvas {
        background: #fff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
        max-width: 96%;
        max-height: 94%;
        border-radius: 3px;
        cursor: crosshair;
        touch-action: none;
      }
      .paint-size-pip {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--surface-2);
        border: 1px solid var(--stroke);
        display: flex;
        align-items: center;
        justify-content: center;
        flex: none;
      }
      .paint-size-pip i {
        border-radius: 50%;
        background: var(--t1);
      }
      .p-spacer {
        flex: 1;
      }

      /* About */
      .about {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        text-align: center;
        padding: 30px;
      }
      .about .tk-logo {
        width: 54px;
        height: 54px;
        margin-bottom: 16px;
      }
      .about h2 {
        font-size: 20px;
        font-weight: 600;
      }
      .about p {
        color: var(--t2);
        font-size: 12.5px;
        line-height: 1.6;
      }
      kbd.k {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 4px;
        background: var(--surface-2);

      // Builds an icon node: <img> with graceful fallback to a colored FA tile
      function appIconNode(appId, size) {
        var a = APPS[appId];
        var holder = el("span");
        holder.style.cssText =
          "display:flex;align-items:center;justify-content:center;flex:none";
        function fallback() {
          holder.innerHTML = "";
          var f = el("span", "icon-fall", '<i class="' + a.icon + '"></i>');
          f.style.width = size + "px";
          f.style.height = size + "px";
          f.style.background = a.c;
          f.style.fontSize = Math.round(size * 0.48) + "px";
          holder.append(f);
        }
        if (!a.img) {
          fallback();
          return holder;
        }
        var img = new Image();
        img.className = "icon-img";
        img.alt = a.name;
        img.style.width = size + "px";
        img.style.height = size + "px";
        img.onerror = fallback;
        img.src = a.img;
        holder.append(img);
        return holder;
      }

      /* =====================================================================
   Window manager
===================================================================== */
      function createWindow(appId, opts) {
        opts = opts || {};
        var app = APPS[appId];
        if (!opts.multi) {
          var existing = null;
          OS.windows.forEach(function (w) {
            if (w.appId === appId) existing = w;
          });
          if (existing) {
            restoreWindow(existing);
            focusWindow(existing);
            return existing;
          }
        }
        var id = OS.nextId++;
        var desk = $("#desktop");
        var W = Math.min(opts.w || app.w || 760, desk.clientWidth - 24);
        var H = Math.min(opts.h || app.h || 520, desk.clientHeight - 24);
        var off = (OS.windows.size % 6) * 28;
        var win = {
          id: id,
          appId: appId,
          el: el("div", "window opening"),
          x: Math.max(8, (desk.clientWidth - W) / 2 + off),
          y: Math.max(8, (desk.clientHeight - H) / 2 - 16 + off),
          w: W,
          h: H,
          maxed: false,
          minimized: false,
          prev: null,
        };
        win.el.style.cssText =
          "left:" +
          win.x +
          "px;top:" +
          win.y +
          "px;width:" +
          W +
          "px;height:" +
          H +
          "px;z-index:" +
          ++OS.z;

        var tb = el("div", "titlebar");
        tb.append(appIconNode(appId, 16));
        var tt = el("span", "tt", app.name);
        tb.append(tt);
        var ctr = el("div", "win-controls");
        var bMin = el(
          "button",
          "wc-min",
          '<i class="fa-solid fa-window-minimize"></i>',
        );
        bMin.title = "Minimize";
        var bMax = el(
          "button",
          "wc-max",
          '<i class="fa-regular fa-square"></i>',
        );
        bMax.title = "Maximize";
        var bX = el(
          "button",
          "wc-close",
          '<i class="fa-solid fa-xmark" style="font-size:13px"></i>',
        );
        bX.title = "Close";
        ctr.append(bMin, bMax, bX);
        tb.append(ctr);
        var body = el("div", "win-body");
        win.el.append(tb, body);
        win.titleEl = tt;
        win.maxBtnIcon = bMax.querySelector("i");

        ["n", "s", "e", "w", "ne", "nw", "se", "sw"].forEach(function (d) {
          var h = el("div", "rz rz-" + d);
          h.addEventListener("pointerdown", function (e) {
            startResize(e, win, d);
          });
          win.el.append(h);
        });

        bX.onclick = function (e) {
          e.stopPropagation();
          closeWindow(win);
        };
        bMin.onclick = function (e) {
          e.stopPropagation();
          minimizeWindow(win);
        };
        bMax.onclick = function (e) {
          e.stopPropagation();
          toggleMax(win);
        };
        tb.addEventListener("dblclick", function (e) {
          if (!e.target.closest(".win-controls")) toggleMax(win);
        });
        tb.addEventListener("pointerdown", function (e) {
          if (!e.target.closest(".win-controls")) startDrag(e, win);
        });
        win.el.addEventListener("pointerdown", function () {
          focusWindow(win);
        });

        desk.append(win.el);
        OS.windows.set(id, win);
        setTimeout(function () {
          win.el.classList.remove("opening");
        }, 180);
        RENDER[appId](body, win);
        focusWindow(win);
        renderTaskApps();
        return win;
      }
      function focusWindow(win) {
        OS.windows.forEach(function (w) {
          w.el.classList.remove("focused");
        });
        win.el.classList.add("focused");
        win.el.style.zIndex = ++OS.z;
        OS.focused = win;
        renderTaskApps();
      }
      function closeWindow(win) {
        if (win.onClose)
          try {
            win.onClose();
          } catch (e) {}
        win.el.classList.add("closing");
        setTimeout(function () {
          win.el.remove();
          OS.windows.delete(win.id);
          var t = topWindow();
          if (t) focusWindow(t);
          else {
            OS.focused = null;
            renderTaskApps();
          }
        }, 150);
      }
      function minimizeWindow(win) {
        win.minimized = true;
        win.el.classList.add("minimized");
        var t = topWindow();
        if (t) focusWindow(t);
        else {
          OS.focused = null;
          renderTaskApps();
        }
      }
      function restoreWindow(win) {
        if (win.minimized) {
          win.minimized = false;
          win.el.classList.remove("minimized");
        }
      }
      function topWindow() {
        var best = null,
          bz = -1;
        OS.windows.forEach(function (w) {
          if (!w.minimized) {
            var z = +w.el.style.zIndex;
            if (z > bz) {
              bz = z;
              best = w;
            }
          }
        });
        return best;
      }
      function applyRect(w) {
        w.el.style.left = w.x + "px";
        w.el.style.top = w.y + "px";
        w.el.style.width = w.w + "px";
        w.el.style.height = w.h + "px";
      }
      function setMaxIcon(win) {
        win.maxBtnIcon.className = win.maxed
          ? "fa-regular fa-window-restore"
          : "fa-regular fa-square";
      }
      function toggleMax(win) {
        var d = $("#desktop");
        if (!win.maxed) {
          win.prev = { x: win.x, y: win.y, w: win.w, h: win.h };
          win.maxed = true;
          win.el.classList.add("maxed");
          win.x = 0;
          win.y = 0;
          win.w = d.clientWidth;
          win.h = d.clientHeight;
        } else {
          win.maxed = false;
          win.el.classList.remove("maxed");
          var p = win.prev || { x: 60, y: 40, w: 760, h: 520 };
          win.x = p.x;
          win.y = p.y;
          win.w = p.w;
          win.h = p.h;
        }
        win.el.style.transition = "all .18s cubic-bezier(.1,.9,.2,1)";
        applyRect(win);
        setMaxIcon(win);
        setTimeout(function () {
          win.el.style.transition = "";
        }, 200);
      }
      function snapTo(win, zone) {
        var d = $("#desktop");
        if (!win.prev) win.prev = { x: win.x, y: win.y, w: win.w, h: win.h };
        if (zone === "max") {
          win.maxed = false;
          toggleMax(win);
          return;
        }
        win.maxed = false;
        win.el.classList.remove("maxed");
        if (zone === "left") {
          win.x = 0;
          win.y = 0;
          win.w = d.clientWidth / 2;
          win.h = d.clientHeight;
        }
        if (zone === "right") {
          win.x = d.clientWidth / 2;
          win.y = 0;
          win.w = d.clientWidth / 2;
          win.h = d.clientHeight;
        }
        win.el.style.transition = "all .16s ease";
        applyRect(win);
        setMaxIcon(win);
        setTimeout(function () {
          win.el.style.transition = "";
        }, 180);
      }
      function startDrag(e, win) {
        e.preventDefault();
        var sx = e.clientX,
          sy = e.clientY,
          ox = win.x,
          oy = win.y,
          started = false,
          zone = null;
        var prev = $("#snap-preview"),
          d = $("#desktop");
        function move(ev) {
          var dx = ev.clientX - sx,
            dy = ev.clientY - sy;
          if (!started && Math.abs(dx) + Math.abs(dy) < 3) return;
          if (!started && win.maxed) {
            var ratio = ev.clientX / d.clientWidth;
            win.maxed = false;
            win.el.classList.remove("maxed");
            var p = win.prev || { w: 760, h: 520 };
            win.w = p.w;
            win.h = p.h;
            ox = ev.clientX - p.w * ratio;
            oy = ev.clientY - 16;
            sx = ev.clientX;
            sy = ev.clientY;
            dx = 0;
            dy = 0;
            setMaxIcon(win);
          }
          started = true;
          win.x = ox + dx;
          win.y = Math.max(0, oy + dy);
          applyRect(win);
          zone = null;
          if (ev.clientY <= 4) zone = "max";
          else if (ev.clientX <= 4) zone = "left";
          else if (ev.clientX >= innerWidth - 5) zone = "right";
          if (zone) {
            prev.style.display = "block";
            if (zone === "max") {
              prev.style.left = "8px";
              prev.style.top = "8px";
              prev.style.width = d.clientWidth - 16 + "px";
              prev.style.height = d.clientHeight - 16 + "px";
            }
            if (zone === "left") {
              prev.style.left = "8px";
              prev.style.top = "8px";
              prev.style.width = d.clientWidth / 2 - 12 + "px";
              prev.style.height = d.clientHeight - 16 + "px";
            }
            if (zone === "right") {
              prev.style.left = d.clientWidth / 2 + 4 + "px";
              prev.style.top = "8px";
              prev.style.width = d.clientWidth / 2 - 12 + "px";
              prev.style.height = d.clientHeight - 16 + "px";
            }
          } else prev.style.display = "none";
        }
        function up() {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
          prev.style.display = "none";
          if (zone) snapTo(win, zone);
        }
        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
      }
      function startResize(e, win, dir) {
        if (win.maxed) return;
        e.preventDefault();
        e.stopPropagation();
        focusWindow(win);
        var sx = e.clientX,
          sy = e.clientY,
          o = { x: win.x, y: win.y, w: win.w, h: win.h };
        function move(ev) {
          var dx = ev.clientX - sx,
            dy = ev.clientY - sy;
          if (dir.indexOf("e") > -1) win.w = Math.max(420, o.w + dx);
          if (dir.indexOf("s") > -1) win.h = Math.max(280, o.h + dy);
          if (dir.indexOf("w") > -1) {
            win.w = Math.max(420, o.w - dx);
            win.x = o.x + (o.w - win.w);
          }
          if (dir.indexOf("n") > -1) {
            win.h = Math.max(280, o.h - dy);
            win.y = o.y + (o.h - win.h);
          }
          applyRect(win);
          if (win.onResize) win.onResize();
        }
        function up() {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
        }
        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
      }

      /* =====================================================================
   Taskbar
===================================================================== */
      var PINNED = [
        "explorer",
        "web",
        "notepad",
        "terminal",
        "paint",
        "calc",
        "settings",
      ];
      function renderTaskApps() {
        var box = $("#tb-apps");
        box.innerHTML = "";
        var openIds = {};
        OS.windows.forEach(function (w) {
          openIds[w.appId] = w;
        });
        var order = PINNED.slice();
        OS.windows.forEach(function (w) {
          if (order.indexOf(w.appId) === -1) order.push(w.appId);
        });
        order.forEach(function (id) {
          var a = APPS[id];
          if (!a || (a.hidden && !openIds[id])) return;
          var b = el("button", "tb-btn");
          b.title = a.name;
          b.append(appIconNode(id, 26));
          b.append(el("span", "pip"));
          if (openIds[id]) b.classList.add("running");
          if (OS.focused && OS.focused.appId === id && !OS.focused.minimized)
            b.classList.add("active-app");
          b.onclick = function () {
            var w = openIds[id];
            if (!w) {
              createWindow(id);
              return;
            }
            if (w.minimized) {
              restoreWindow(w);
              focusWindow(w);
            } else if (OS.focused === w) minimizeWindow(w);
            else focusWindow(w);
          };
          b.oncontextmenu = function (e) {
            e.preventDefault();
            var items = [
              {
                label: a.name,
                icon: a.icon,
                action: function () {
                  createWindow(id, { multi: true });
                },
              },
            ];
            if (openIds[id])

      var calBase = new Date();
      function renderCal() {
        var y = calBase.getFullYear(),
          m = calBase.getMonth();
        $("#cal-title").textContent = calBase.toLocaleDateString([], {
          month: "long",
          year: "numeric",
        });
        var grid = $("#cal-grid");
        grid.innerHTML = "";
        ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].forEach(function (d) {
          grid.append(el("div", "dow", d));
        });
        var first = new Date(y, m, 1).getDay();
        var prevDays = new Date(y, m, 0).getDate();
        var days = new Date(y, m + 1, 0).getDate();
        var today = new Date();
        for (var i = first - 1; i >= 0; i--)
          grid.append(el("button", "day dim", String(prevDays - i)));
        for (var d2 = 1; d2 <= days; d2++) {
          var cell = el("button", "day", String(d2));
          if (
            d2 === today.getDate() &&
            m === today.getMonth() &&
            y === today.getFullYear()
          )
            cell.classList.add("today");
          grid.append(cell);
        }
        var total = grid.children.length - 7;
        for (var n = 1; total + n <= 42; n++)
          grid.append(el("button", "day dim", String(n)));
      }
      $("#cal-prev").onclick = function () {

          Math.max(8, r.left + r.width / 2 - fr.width / 2),
          innerWidth - fr.width - 8,

        fly.style.left = left + "px";

        fly.style.top = "auto";

          row.onclick = function () {
            closeMenu();

        var r = m.getBoundingClientRect();
        m.style.left = Math.min(x, innerWidth - r.width - 8) + "px";
        m.style.top =
          (up

      RENDER.web = function (body, win) {
        body.innerHTML = "";
        var brw = el("div", "brw");
        body.append(brw);
        var strip = el("div", "brw-tabstrip");
        var navbar = el("div", "brw-navbar");
        var bmbar = el("div", "brw-bmbar");
        var view = el("div", "brw-view");
        brw.append(strip, navbar, bmbar, view);

        var tabs = [],
          active = -1,
          seq = 0,
          zoom = 1;

        var bBack = el(
          "button",
          "ibtn",
          '<i class="fa-solid fa-arrow-left"></i>',
        );
        bBack.title = "Back";
        var bFwd = el(
          "button",
          "ibtn",
          '<i class="fa-solid fa-arrow-right"></i>',

        bFwd.title = "Forward";

        );
        bRe.title = "Reload";
        var bHome = el("button", "ibtn", '<i class="fa-solid fa-house"></i>');
        bHome.title = "New tab page";
        var omni = el("div", "brw-omni");
        var sec = el("i", "fa-solid fa-magnifying-glass sec");
        var urlIn = el("input");
        urlIn.placeholder = "Search the web or enter an address";
        urlIn.spellcheck = false;
        var star = el("button", "star", '<i class="fa-regular fa-star"></i>');
        star.title = "Bookmark this page";
        omni.append(sec, urlIn, star);
        var bHist = el(

          "ibtn",

        );
        bHist.title = "History";
        var bMore = el(
          "button",
          "ibtn",
          '<i class="fa-solid fa-ellipsis"></i>',
        );
        bMore.title = "Settings and more";
        navbar.append(bBack, bFwd, bRe, bHome, omni, bHist, bMore);

        function host(u) {
          try {
            return new URL(u).hostname.replace(/^www\./, "");
          } catch (e) {
            return "";
          }
        }
        function isNTP(u) {
          return u === "talko://newtab";
        }
        function normalize(input) {
          input = input.trim();
          if (!input) return null;
          if (/^https?:\/\//i.test(input)) return input;
          if (
            /^[a-z0-9.-]+\.[a-z]{2,}(\/|$|\?)/i.test(input) &&
            input.indexOf(" ") === -1
          )
            return "https://" + input;
          return (
            "https://en.wikipedia.org/w/index.php?search=" +
            encodeURIComponent(input)
          );
        }
        function applyZoomTo(f) {
          f.style.transform = "scale(" + zoom + ")";
          f.style.width = 100 / zoom + "%";
          f.style.height = 100 / zoom + "%";
        }

        function makeNTP(t) {
          var ntp = el("div", "brw-ntp");
          var clock = el("div", "ntp-clock");
          var date = el("div", "ntp-date");
          function upd() {
            var d = new Date();
            clock.textContent = d.toLocaleTimeString([], {
              hour: "numeric",
              minute: "2-digit",
            });
            date.textContent = d.toLocaleDateString([], {
              weekday: "long",
              month: "long",
              day: "numeric",
            });
          }
          upd();
          t.ntpTimer = setInterval(upd, 10000);
          var search = el("div", "ntp-search");
          var si = el("input");
          si.placeholder = "Search the web";
          search.append(el("i", "fa-solid fa-magnifying-glass"), si);
          si.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && si.value.trim())
              nav(t, normalize(si.value));
          });
          var tiles = el("div", "ntp-tiles");
          NTP_TILES.forEach(function (s) {
            var tile = el("button", "ntp-tile");
            tile.innerHTML =
              '<span class="bub"><img src="' +
              fav(s.d) +
              '" alt=""></span><span>' +
              s.name +
              "</span>";
            tile.onclick = function () {
              nav(t, s.url);
            };
            tiles.append(tile);
          });
          ntp.append(clock, date, search, tiles);
          setTimeout(function () {
            si.focus();
          }, 60);
          return ntp;
        }

        // Single render path for a tab's current URL. Used by nav, back, forward, reload.
        function loadCurrent(t, recordGlobal) {
          var url = t.url;
          t.holder.innerHTML = "";
          if (t.ntpTimer) {
            clearInterval(t.ntpTimer);
            t.ntpTimer = null;
          }
          t.frame = null;
          if (isNTP(url)) {
            t.title = "New tab";
            t.loading = false;
            t.holder.append(makeNTP(t));
          } else {
            t.title = host(url) || url;
            t.loading = true;
            var f = el("iframe");
            f.setAttribute(
              "sandbox",
              "allow-scripts allow-same-origin allow-forms allow-popups",
            );
            f.src = url;
            applyZoomTo(f);
            f.addEventListener("load", function () {
              t.loading = false;
              renderStrip();
            });
            t.frame = f;
            t.holder.append(f);
            if (recordGlobal) {
              globalHistory.unshift({
                url: url,
                host: t.title,
                time: new Date(),
              });
              if (globalHistory.length > 40) globalHistory.pop();
            }
          }
          renderStrip();
          syncChrome();
        }
        function nav(t, url) {
          if (!url) return;
          t.hist = t.hist.slice(0, t.hi + 1);
          t.hist.push(url);
          t.hi++;
          t.url = url;
          loadCurrent(t, true);
        }
        function newTab(url) {
          var t = {
            id: seq++,
            url: url || "talko://newtab",
            title: "New tab",
            hist: [url || "talko://newtab"],
            hi: 0,
            frame: null,
          };
          t.holder = el("div", "tab-holder");
          t.holder.style.display = "none";
          view.append(t.holder);
          tabs.push(t);
          active = tabs.length - 1;
          loadCurrent(t, !isNTP(t.url));
        }
        function closeTab(i) {
          var t = tabs[i];
          if (t.ntpTimer) clearInterval(t.ntpTimer);
          t.holder.remove();
          tabs.splice(i, 1);
          if (!tabs.length) {
            closeWindow(win);
            return;
          }
          if (active >= tabs.length) active = tabs.length - 1;
          renderStrip();
          syncChrome();
        }
        function renderStrip() {
          strip.innerHTML = "";
          tabs.forEach(function (t, i) {
            var tab = el(
              "div",
              "brw-tab" +
                (i === active ? " on" : "") +
                (t.loading ? " loading" : ""),
            );
            var favEl = isNTP(t.url)
              ? '<span class="fav"><i class="fa-solid fa-plus" style="font-size:9px"></i></span>'
              : '<span class="fav"><img src="' +
                fav(host(t.url)) +
                '" alt=""></span>';
            tab.innerHTML =
              favEl +
              '<span class="lbl">' +
              t.title +
              '</span><span class="loadbar"></span>';
            var x = el("button", "tx", '<i class="fa-solid fa-xmark"></i>');
            x.onclick = function (e) {
              e.stopPropagation();
              closeTab(i);
            };
            tab.append(x);
            tab.onclick = function () {
              active = i;
              renderStrip();
              syncChrome();
            };
            tab.onauxclick = function (e) {
              if (e.button === 1) {
                e.preventDefault();
                closeTab(i);
              }
            };
            strip.append(tab);
          });
          var add = el(
            "button",
            "brw-addtab",
            '<i class="fa-solid fa-plus"></i>',
          );
          add.title = "New tab";
          add.onclick = function () {
            newTab();
          };
          strip.append(add);
          tabs.forEach(function (t, i) {
            t.holder.style.display = i === active ? "block" : "none";
          });
        }
        function syncChrome() {
          var t = tabs[active];
          if (!t) return;
          urlIn.value = isNTP(t.url) ? "" : t.url;
          sec.className = isNTP(t.url)
            ? "fa-solid fa-magnifying-glass sec"
            : t.url.indexOf("https:") === 0
              ? "fa-solid fa-lock sec"
              : "fa-solid fa-triangle-exclamation sec";
          bBack.classList.toggle("dis", t.hi <= 0);
          bFwd.classList.toggle("dis", t.hi >= t.hist.length - 1);
          bRe.classList.toggle("dis", isNTP(t.url));
          var marked = userMarks.some(function (b) {
            return b.url === t.url;
          });
          star.querySelector("i").className = marked
            ? "fa-solid fa-star"
            : "fa-regular fa-star";
          star.classList.toggle("marked", marked);
          win.titleEl.textContent = t.title + " — TalkoWeb";
        }
        function renderBmBar() {
          bmbar.innerHTML = "";
          userMarks.forEach(function (b) {
            var chip = el(
              "button",
              "bm-chip",
              '<img src="' + fav(b.d) + '" alt=""><span>' + b.name + "</span>",
            );
            chip.onclick = function () {

                [

                      newTab(b.url);

                  {
                    label: "Remove bookmark",
                    icon: "fa-solid fa-trash-can",
                    action: function () {
                      userMarks = userMarks.filter(function (x) {
                        return x !== b;
                      });
                      renderBmBar();
                      syncChrome();
                    },
                  },
                ],
                e.clientX,
                e.clientY,
              );
            };
            bmbar.append(chip);
          });
        }

        urlIn.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            var u = normalize(urlIn.value);
            if (u) nav(tabs[active], u);

      RENDER.terminal = function (body, win) {
        body.innerHTML = "";
        var term = el("div", "term");
        body.append(term);
        var cwd = "C:\\Users\\Guest",
          hist = [],
          hi = 0;
        var row = el("div", "term-row");
        function print(html, cls) {
          var l = el("div", "ln" + (cls ? " " + cls : ""));
          l.innerHTML = html;
          term.insertBefore(l, row);
          term.scrollTop = term.scrollHeight;
        }
        function esc(s) {
          return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
        }
        function resolve(p) {
          if (!p) return cwd;
          var base = /^[A-Za-z]:\\/.test(p) ? p : cwd + "\\" + p;
          var parts = base.split("\\").filter(function (x) {
            return x.length;
          });
          var drive = parts.shift();
          var out = [];
          parts.forEach(function (part) {
            if (part === ".") return;
            if (part === "..") out.pop();
            else out.push(part);
          });
          return out.length ? drive + "\\" + out.join("\\") : drive + "\\";
        }
        function dirOf(p) {
          return FS[p] || null;
        }
        var CMDS = {
          help: function () {
            print(
              '<span class="dim">Commands:</span>\n  help          this list\n  dir / ls      list directory\n  cd DIR        change directory (cd .. to go up)\n  type FILE     print a file (alias: cat)\n  echo TEXT     print text\n  cls / clear   clear screen\n  date          date and time\n  whoami        current user\n  start APP     launch an app (notepad, web, paint, calc, files, settings)\n  systeminfo    machine details\n  talko         a small surprise',
            );
          },
          dir: function (a) {
            var p = resolve(a[0]);
            var list = dirOf(p);
            if (!list) {
              print("The system cannot find the path specified.", "err");
              return;
            }
            print('<span class="dim"> Directory of ' + esc(p) + "</span>\n");
            list.forEach(function (f) {
              var isDir = !!dirOf(p === "C:\\" ? "C:\\" + f : p + "\\" + f);
              print(
                (isDir
                  ? '  <span class="pth">&lt;DIR&gt;</span>   '
                  : "          ") + esc(f),
              );
            });
          },
          cd: function (a) {
            if (!a[0]) {
              print(cwd);
              return;
            }
            var p = resolve(a[0]);
            if (dirOf(p)) cwd = p;
            else print("The system cannot find the path specified.", "err");
          },
          type: function (a) {
            if (!a[0]) {
              print("Usage: type FILE", "err");
              return;
            }
            var name = a[0].split("\\").pop();
            var full = resolve(a[0]);
            var parent = full.split("\\").slice(0, -1).join("\\");
            if (parent.indexOf("\\") === -1) parent += "\\";
            var list = dirOf(parent);
            if (list && list.indexOf(name) > -1)
              print(
                esc(
                  FILE_CONTENT[name] != null
                    ? FILE_CONTENT[name]
                    : "[binary file]",
                ),
              );
            else print("The system cannot find the file specified.", "err");
          },
          echo: function (a) {
            print(esc(a.join(" ")));
          },
          cls: function () {
            Array.prototype.slice
              .call(term.querySelectorAll(".ln"))
              .forEach(function (l) {
                l.remove();
              });
          },
          date: function () {
            print(new Date().toString());
          },
          whoami: function () {
            print("talko\\guest");
          },
          start: function (a) {
            var map = {
              notepad: "notepad",
              web: "web",
              browser: "web",
              talkoweb: "web",
              calc: "calc",
              paint: "paint",
              calculator: "calc",
              files: "explorer",
              explorer: "explorer",
              settings: "settings",
              terminal: "terminal",
            };
            if (map[a[0]]) {
              createWindow(map[a[0]]);
              print("Starting " + a[0] + "...", "dim");
            } else print("Unknown application: " + esc(a[0] || ""), "err");
          },
          systeminfo: function () {
            print(
              '<span class="dim">Host Name:</span>        TALKO-PC\n<span class="dim">OS Name:</span>          TalkoBrowser 1.0\n<span class="dim">OS Build:</span>         one HTML file\n<span class="dim">System Type:</span>      browser-based\n<span class="dim">Display:</span>          ' +
                innerWidth +
                " x " +
                innerHeight +
                '\n<span class="dim">Uptime:</span>           ' +
                Math.floor(performance.now() / 1000) +
                " seconds",
            );
          },
          talko: function () {
            print(
              '<span class="pth"> _____     _ _         </span>\n<span class="pth">|_   _|_ _| | |_____   </span>\n<span class="pth">  | |/ _` | | / / _ \\  </span>\n<span class="pth">  |_|\\__,_|_|_\\_\\___/  </span>\n<span class="dim">Talk to the world, one keystroke at a time.</span>',
            );
          },
        };
        CMDS.ls = CMDS.dir;
        CMDS.cat = CMDS.type;
        CMDS.clear = CMDS.cls;

        var prompt = el("span");
        var input = el("input", "term-in");
        input.spellcheck = false;
        input.autocapitalize = "off";
        row.append(prompt, input);
        term.append(row);
        function refresh() {
          prompt.innerHTML =
            '<span class="ps">PS</span> <span class="pth">' +
            esc(cwd) +
            '</span><span class="dim">&gt;&nbsp;</span>';
        }
        function run(line) {
          print(
            '<span class="ps">PS</span> <span class="pth">' +
              esc(cwd) +
              '</span><span class="dim">&gt;</span> ' +
              esc(line),
          );
          var parts = line.trim().split(/\s+/);
          var cmd = (parts.shift() || "").toLowerCase();
          if (!cmd) return;
          hist.push(line);
          hi = hist.length;
          if (CMDS[cmd]) CMDS[cmd](parts);
          else
            print(
              "'" + esc(cmd) + "' is not recognized as a command. Type help.",
              "err",
            );
        }
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            run(input.value);
            input.value = "";
            refresh();
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (hi > 0) {
              hi--;
              input.value = hist[hi];
            }
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (hi < hist.length - 1) {
              hi++;
              input.value = hist[hi];
            } else {
              hi = hist.length;
              input.value = "";
            }
          }
        });
        term.addEventListener("click", function () {
          input.focus();
        });
        print("TalkoBrowser Terminal [Version 1.0]", "dim");
        print("Type <b>help</b> to get started.\n", "dim");
        refresh();
        setTimeout(function () {
          input.focus();
        }, 80);
      };

        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        var color = "#1b1b1c",
          size = 6,
          eraser = false,
          drawing = false,
          last = null;
        var PALETTE = [
          "#1b1b1c",
          "#c42b1c",
          "#ff9349",
          "#ffc83d",
          "#107c10",

        bBrush.onclick = function () {

        bErase.onclick = function () {
          setTool(true);

        function renderSwatches() {

              color = c;
              setTool(false);

            };

          });
