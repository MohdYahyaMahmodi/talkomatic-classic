        var pick = el("input");
        pick.type = "color";
        pick.value = color;
        pick.title = "Custom color";
        pick.addEventListener("input", function () {
          color = pick.value;
          setTool(false);
          renderSwatches();
        });

        var sizePip = el("span", "paint-size-pip", "<i></i>");
        function pip() {
          var d = Math.max(2, Math.min(18, size));
          var i = sizePip.querySelector("i");
          i.style.width = d + "px";
          i.style.height = d + "px";
        }
        var range = el("input");
        range.type = "range";
        range.min = 1;
        range.max = 60;
        range.value = size;
        range.title = "Brush size";
        range.addEventListener("input", function () {
          size = +range.value;
          pip();
        });

        var bClear = el(
          "button",
          "ibtn",
          '<i class="fa-regular fa-trash-can"></i>',
        );
        bClear.title = "Clear canvas";
        bClear.onclick = function () {
          showMenu(
            [
              {
                label: "Clear the whole canvas",
                icon: "fa-regular fa-trash-can",
                action: function () {
                  ctx.fillStyle = "#ffffff";
                  ctx.fillRect(0, 0, canvas.width, canvas.height);
                },
              },
            ],
            bClear.getBoundingClientRect().left,
            bClear.getBoundingClientRect().bottom + 6,
          );
        };
        var bSave = el(
          "button",
          "ibtn",
          '<i class="fa-solid fa-download"></i>',
        );
        bSave.title = "Save as PNG";
        bSave.onclick = function () {
          var a = document.createElement("a");
          a.download = "talko-drawing.png";
          a.href = canvas.toDataURL("image/png");
          a.click();
          toast(
            "paint",
            "Paint",
            "Saved talko-drawing.png to your real Downloads folder.",
          );
        };

        bar.append(
          bBrush,
          bErase,
          sw,
          pick,
          el("span", "p-spacer"),
          sizePip,
          range,
          el("span", "p-spacer"),
          bClear,
          bSave,
        );
        renderSwatches();
        pip();

        function pt(e) {
          var r = canvas.getBoundingClientRect();
          return {
            x: (e.clientX - r.left) * (canvas.width / r.width),
            y: (e.clientY - r.top) * (canvas.height / r.height),
          };
        }
        canvas.addEventListener("pointerdown", function (e) {
          drawing = true;
          last = pt(e);
          canvas.setPointerCapture(e.pointerId);
          ctx.beginPath();
          ctx.fillStyle = eraser ? "#ffffff" : color;
          ctx.arc(
            last.x,
            last.y,
            (eraser ? size * 2 : size) / 2,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        });
        canvas.addEventListener("pointermove", function (e) {
          if (!drawing) return;
          var p = pt(e);
          ctx.strokeStyle = eraser ? "#ffffff" : color;
          ctx.lineWidth = eraser ? size * 2 : size;
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
          last = p;
        });
        function stop() {
          drawing = false;
          last = null;
        }
        canvas.addEventListener("pointerup", stop);
        canvas.addEventListener("pointercancel", stop);
        win.titleEl.textContent = "Untitled — Paint";

            tg.onclick = function () {
              OS.settings.transparency = !OS.settings.transparency;
              applyTransparency();
              tg.classList.toggle("on");
            };
            cTr.querySelector(".end").append(tg);
            pg.append(cTr);

            pg.append(el("div", "set-section", "Background"));
            var cWp = el("div", "set-card");
            cWp.style.alignItems = "stretch";
            var grid = el("div", "wp-grid");
            WALLPAPERS.forEach(function (w, i) {
              var th = el(
                "button",
                "wp-th" + (OS.settings.wallpaper === i ? " on" : ""),
              );
              th.style.backgroundImage =
                "url(" + w.url.replace("2400/1500", "480/300") + ")";
              th.title = w.name;
              th.onclick = function () {
                setWallpaper(i);
                renderPane();
              };
              grid.append(th);
            });
            cWp.append(grid);
            pg.append(cWp);
          }
          if (sec === "system") {
            pg.append(el("div", "set-h1", "System"));
            pg.append(
              card(
                "fa-solid fa-display",
                "Display",
                "Resolution " + innerWidth + " x " + innerHeight,
              ),
            );
            var c2 = card(
              "fa-regular fa-bell",
              "Notifications",
              "Toast banners from apps",
            );
            var tg2 = el("button", "toggle on");
            tg2.onclick = function () {
              tg2.classList.toggle("on");
            };
            c2.querySelector(".end").append(tg2);
            pg.append(c2);
            var c3 = card(
              "fa-solid fa-wand-magic-sparkles",
              "Snap layouts",
              "Drag windows to screen edges to tile them",
            );
            c3.querySelector(".end").innerHTML =
              '<span style="color:var(--t2);font-size:12px">On</span>';
            pg.append(c3);
          }
          if (sec === "about") {
            pg.append(el("div", "set-h1", "About"));
            [
              ["Device name", "TALKO-PC"],
              ["Edition", "TalkoBrowser 1.0"],
              ["Build", "WEB_APP"],
              ["Processor", "TALKO_CPU_5GHZ"],
              ["Installed RAM", "One tab's worth"],
              [
                "Renderer",
                navigator.userAgent.indexOf("Firefox") > -1
                  ? "Gecko"
                  : navigator.userAgent.indexOf("Chrome") > -1
                    ? "Blink"
                    : "WebKit",
              ],
            ].forEach(function (r) {
              var c = card("fa-solid fa-microchip", r[0]);
              c.querySelector("i").style.visibility = "hidden";
              c.querySelector(".end").innerHTML =
                '<span style="color:var(--t2);font-size:12.5px">' +
                r[1] +
                "</span>";
              pg.append(c);
            });
          }
          pane.append(pg);
        }
        renderRail();
        renderPane();
      };

      /* ============================== CALCULATOR ============================== */
      RENDER.calc = function (body, win) {
        body.innerHTML = "";
        var c = el("div", "calc");
        var histEl = el("div", "calc-hist", "");
        var disp = el("div", "calc-disp", "0");
        var grid = el("div", "calc-grid");
        c.append(histEl, disp, grid);
        body.append(c);
        var cur = "0",
          prev = null,
          op = null,
          fresh = true;
        function fmt(n) {
          if (!isFinite(n)) return "Cannot divide by zero";
          var s = String(+(+n).toPrecision(12));
          return s.length > 13 ? (+n).toExponential(6) : s;
        }
        function show() {
          disp.textContent = cur;
          disp.style.fontSize = String(cur).length > 11 ? "26px" : "44px";
          histEl.textContent = prev != null && op ? fmt(+prev) + " " + op : "";
        }
        function digit(d) {
          if (cur === "Cannot divide by zero") {
            cur = "0";
            fresh = true;
          }
          if (fresh) {
            cur = d === "." ? "0." : d;
            fresh = false;
          } else {
            if (d === "." && cur.indexOf(".") > -1) return;
            cur = cur === "0" && d !== "." ? d : cur + d;
          }
          show();
        }
        function calcOp(a, b, o) {
          if (o === "+") return a + b;
          if (o === "-") return a - b;
          if (o === "\u00d7") return a * b;
          return b === 0 ? NaN : a / b;
        }
        function equals() {
          if (op == null || prev == null) return;
          cur = fmt(calcOp(+prev, +cur, op));
          prev = null;
          op = null;
          fresh = true;
          show();
        }
        function setOp(o) {
          if (op && !fresh) equals();
          prev = cur;
          op = o;
          fresh = true;
          show();
        }
        var LAYOUT = [
          [
            "%",
            "fn",
            function () {
              cur = fmt(+cur / 100);
              show();
            },
          ],
          [
            "CE",
            "fn",
            function () {
              cur = "0";
              fresh = true;
              show();
            },
          ],
          [
            "C",
            "fn",
            function () {
              cur = "0";
              prev = null;
              op = null;
              fresh = true;
              show();
            },
          ],
          [
            "\u232b",
            "fn",
            function () {
              cur = cur.length > 1 ? cur.slice(0, -1) : "0";
              show();
            },
          ],
          [
            "1/x",
            "fn",
            function () {
              cur = fmt(1 / +cur);
              show();
            },
          ],
          [
            "x\u00b2",
            "fn",
            function () {
              cur = fmt(Math.pow(+cur, 2));
              show();
            },
          ],
          [
            "\u221ax",
            "fn",
            function () {
              cur = fmt(Math.sqrt(+cur));
              show();
            },
          ],
          [
            "\u00f7",
            "fn",
            function () {
              setOp("\u00f7");
            },
          ],
          [
            "7",
            "num",
            function () {
              digit("7");
            },
          ],
          [
            "8",
            "num",
            function () {
              digit("8");
            },
          ],
          [
            "9",
            "num",
            function () {
              digit("9");
            },
          ],
          [
            "\u00d7",
            "fn",
            function () {
              setOp("\u00d7");
            },
          ],
          [
            "4",
            "num",
            function () {
              digit("4");
            },
          ],
          [
            "5",
            "num",
            function () {
              digit("5");
            },
          ],
          [
            "6",
            "num",
            function () {
              digit("6");
            },
          ],
          [
            "-",
            "fn",
            function () {
              setOp("-");
            },
          ],
          [
            "1",
            "num",
            function () {
              digit("1");
            },
          ],
          [
            "2",
            "num",
            function () {
              digit("2");
            },
          ],
          [
            "3",
            "num",
            function () {
              digit("3");
            },
          ],
          [
            "+",
            "fn",
            function () {
              setOp("+");
            },
          ],
          [
            "+/-",
            "num",
            function () {
              cur = fmt(-+cur);
              show();
            },
          ],
          [
            "0",
            "num",
            function () {
              digit("0");
            },
          ],
          [
            ".",
            "num",
            function () {
              digit(".");
            },
          ],
          ["=", "eq", equals],
        ];
        LAYOUT.forEach(function (b) {
          var btn = el("button", b[1], b[0]);
          btn.onclick = b[2];
          grid.append(btn);
        });
        show();
      };

      /* ============================== EXPLORER ============================== */
      RENDER.explorer = function (body, win) {
        body.innerHTML = "";
        var fill = el("div", "fill");
        body.append(fill);
        var rail = el("div", "navrail");
        var pane = el("div", "pane");
        fill.append(rail, pane);
        var cwd = "C:\\Users\\Guest",
          selected = null;
        var FAVS = [
          ["Home", "fa-solid fa-house", "C:\\Users\\Guest"],
          ["Desktop", "fa-solid fa-display", "C:\\Users\\Guest\\Desktop"],
          [
            "Documents",
            "fa-regular fa-file-lines",
            "C:\\Users\\Guest\\Documents",
          ],
          ["Downloads", "fa-solid fa-download", "C:\\Users\\Guest\\Downloads"],
          ["Pictures", "fa-regular fa-image", "C:\\Users\\Guest\\Pictures"],
          ["Projects", "fa-solid fa-code", "C:\\Users\\Guest\\Projects"],
          ["This PC", "fa-solid fa-hard-drive", "C:\\"],
        ];
        function dirOf(p) {
          return FS[p] || null;
        }
        function join(p, name) {
          return p === "C:\\" ? "C:\\" + name : p + "\\" + name;
        }
        function fileImgNode(name) {
          var holder = el("span");
          holder.style.cssText =
            "display:flex;align-items:center;justify-content:center;flex:none;width:18px";
          var isDir = !!dirOf(join(cwd, name));
          var ext = name.split(".").pop();
          var src = isDir ? FILE_IMG.folder : FILE_IMG[ext];
          function fallback() {
            holder.innerHTML = isDir
              ? '<i class="fa-solid fa-folder" style="color:#ffd061"></i>'
              : '<i class="fa-regular fa-file"></i>';
          }
          if (!src) {
            fallback();
            return holder;
          }
          var img = new Image();
          img.alt = "";
          img.style.cssText = "width:18px;height:18px;object-fit:contain";
          img.onerror = fallback;
          img.src = src;
          holder.append(img);
          return holder;
        }
        function openItem(name) {
          var full = join(cwd, name);
          if (dirOf(full)) {
            cwd = full;
            selected = null;
            renderAll();
            return;
          }
          if (FILE_CONTENT[name] != null) openFileInNotepad(name);
          else if (/\.(png|jpg)$/.test(name)) {
            createWindow("paint");
            toast(
              "paint",
              "Paint",
              "Opened a blank canvas — the image itself is set dressing.",
            );
          } else
            toast(
              "explorer",
              "File Explorer",
              "TalkoBrowser cannot open this file. It is set dressing.",
            );
        }
        function renderRail() {
          rail.innerHTML = "";
          rail.append(el("div", "rail-head", "Quick access"));
          FAVS.forEach(function (f) {
            var it = el(
              "button",
              "rail-item" + (cwd === f[2] ? " active" : ""),
            );
            it.innerHTML =
              '<i class="' + f[1] + '"></i><span>' + f[0] + "</span>";
            it.onclick = function () {
              cwd = f[2];
              selected = null;
              renderAll();
            };
            rail.append(it);
          });
        }
        function renderMain() {
          pane.innerHTML = "";
          var bar = el("div", "exp-bar");
          var bUp = el(
            "button",
            "ibtn",
            '<i class="fa-solid fa-arrow-up"></i>',
          );
          bUp.title = "Up";
          bUp.onclick = function () {
            if (cwd === "C:\\") return;
            var parts = cwd.split("\\").filter(function (x) {
              return x;
            });
            parts.pop();
            cwd = parts.length === 1 ? "C:\\" : parts.join("\\");
            selected = null;
            renderAll();
          };
          var crumbs = el("div", "exp-crumbs");
          var segs = cwd.split("\\").filter(function (x) {
            return x;
          });
          segs.forEach(function (s, i) {
            if (i > 0) crumbs.append(el("i", "fa-solid fa-chevron-right"));
            var c = el("button", "crumb", s === "C:" ? "This PC" : s);
            c.onclick = function () {
              cwd = i === 0 ? "C:\\" : segs.slice(0, i + 1).join("\\");
              selected = null;
              renderAll();
            };
            crumbs.append(c);
          });
          bar.append(bUp, crumbs);
          var head = el(
            "div",
            "exp-head",
            "<span>Name</span><span>Type</span><span>Size</span>",
          );
          var list = el("div", "exp-list");
          var items = dirOf(cwd) || [];
          items.forEach(function (name) {
            var isDir = !!dirOf(join(cwd, name));
            var ext = name.split(".").pop();
            var type = isDir
              ? "File folder"
              : FILE_META[ext] || ext.toUpperCase() + " File";
            var size = isDir
              ? ""
              : FILE_CONTENT[name] != null
                ? Math.max(
                    1,
                    Math.round((FILE_CONTENT[name].length / 1024) * 10) / 10,
                  ) + " KB"
                : Math.floor(name.length * 7.3) + " KB";
            var rowEl = el(
              "div",
              "exp-row" + (selected === name ? " sel" : ""),
            );
            var nm = el("span", "nm");
            nm.append(fileImgNode(name));
            nm.append(el("span", "", name));
            rowEl.append(nm);
            rowEl.append(el("span", "meta", type));
            rowEl.append(el("span", "meta", size));
            rowEl.onclick = function (e) {
              e.stopPropagation();
              selected = name;
              renderAll();
            };
            rowEl.ondblclick = function () {
              openItem(name);
            };
            rowEl.oncontextmenu = function (e) {
              e.preventDefault();
              e.stopPropagation();
              selected = name;
              renderAll();
              showMenu(
                [
                  {
                    label: "Open",
                    icon: "fa-solid fa-arrow-up-right-from-square",
                    action: function () {
                      openItem(name);
                    },
                  },
                  {
                    label: "Open in Terminal",
                    icon: "fa-solid fa-terminal",
                    action: function () {
                      createWindow("terminal");
                    },
                  },
                  "-",
                  {
                    label: "Properties",
                    icon: "fa-solid fa-circle-info",
                    action: function () {
                      toast(
                        "explorer",
                        name,
                        type +
                          (size ? " \u00b7 " + size : "") +
                          " \u00b7 " +
                          cwd,
                      );
                    },
                  },
                ],
                e.clientX,
                e.clientY,
              );
            };
            list.append(rowEl);
          });
          list.onclick = function () {
            selected = null;
            renderAll();
          };
          var status = el(
            "div",
            "exp-status",
            items.length + " items" + (selected ? "  \u00b7  1 selected" : ""),
          );
          pane.append(bar, head, list, status);
        }
        function renderAll() {
          renderRail();
          renderMain();
          win.titleEl.textContent =
            (cwd === "C:\\" ? "This PC" : cwd.split("\\").pop()) +
            " — File Explorer";
        }
        renderAll();
      };

      /* ============================== ABOUT ============================== */
      RENDER.about = function (body, win) {
        body.innerHTML = "";
        var a = el("div", "about");
        a.innerHTML =
          '<span class="tk-logo"><i></i><i></i><i></i><i></i></span>' +
          "<h2>TalkoBrowser</h2><p>Version 1.0</p>" +
          '<p style="margin-top:14px;max-width:330px">A complete desktop — taskbar, start menu, snap layouts, seven working apps — rendered by a single HTML file. No framework, no build step, no server required.</p>' +
          '<p style="margin-top:14px"><kbd class="k">drag to edges</kbd> snap windows &nbsp; <kbd class="k">right-click</kbd> menus everywhere</p>';
        body.append(a);
      };

      /* =====================================================================
   Theme plumbing
===================================================================== */
      function setTheme(t) {
        OS.settings.theme = t;
        document.body.dataset.theme = t;
      }
      function setAccent(light, dim) {
        OS.settings.accent = light;
        OS.settings.accentDim = dim;
        var root = document.documentElement.style;
        root.setProperty("--accent", light);
        root.setProperty("--accent-dim", dim);
        var r = parseInt(light.slice(1, 3), 16),
          g = parseInt(light.slice(3, 5), 16),
          b = parseInt(light.slice(5, 7), 16);
        root.setProperty(
          "--accent-soft",
          "rgba(" + r + "," + g + "," + b + ",.16)",
        );
      }
      function setWallpaper(i) {
        OS.settings.wallpaper = i;
        $("#wallpaper").style.backgroundImage =
          "url(" + WALLPAPERS[i].url + ")";
      }
      function applyTransparency() {
        var root = document.documentElement.style;
        if (!OS.settings.transparency)
          root.setProperty("--mica", "var(--mica-solid)");
        else root.removeProperty("--mica");
      }

      /* =====================================================================
   Boot
===================================================================== */
      renderTaskApps();
      setWallpaper(0);
      setAccent(OS.settings.accent, OS.settings.accentDim);
      setTimeout(function () {
        $("#boot").style.opacity = "0";
        setTimeout(function () {
          $("#boot").remove();
        }, 750);
        setTimeout(function () {
          createWindow("notepad");
          toast(
            "about",
            "Welcome to TalkoBrowser",
            "Open TalkoWeb from the taskbar, drag windows to screen edges to snap them, and try Paint.",
          );
        }, 450);
      }, 1500);
    </script>
