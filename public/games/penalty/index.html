<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>World Cup Penalty Shootout — Pro</title>
    <link rel="icon" href="data:," />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #070d1f;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        color: #fff;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* ---------- FLAT OVERLAYS ---------- */
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 20;
        background: #0a1126;
        transition:
          opacity 0.35s ease,
          visibility 0.35s;
      }
      .overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .trophy {
        font-size: 60px;
        color: #ffd54a;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .title {
        font-size: clamp(34px, 8vw, 62px);
        font-weight: 900;
        font-style: italic;
        letter-spacing: 1px;
        margin-top: 12px;
        color: #ffd54a;
        text-align: center;
        line-height: 1.05;
      }
      .subtitle {
        color: #8ea4d6;
        font-weight: 700;
        letter-spacing: 6px;
        font-size: clamp(11px, 3vw, 14px);
        margin-top: 10px;
        text-transform: uppercase;
      }
      .flags {
        margin-top: 14px;
        font-size: 22px;
        letter-spacing: 6px;
      }
      .btn {
        margin-top: 30px;
        padding: 16px 52px;
        font-size: 19px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: 2px;
        color: #0a1126;
        background: #ffd54a;
        border: 3px solid #fff;
        border-radius: 8px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          background 0.12s;
        text-transform: uppercase;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn:hover {
        background: #ffe27a;
      }
      .howto {
        margin-top: 28px;
        color: #c8d4f0;
        font-size: 13px;
        display: flex;
        gap: 24px;
        text-align: center;
      }
      .howto div {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        max-width: 110px;
      }
      .howto i {
        font-size: 22px;
        color: #ffd54a;
      }

      /* ---------- HUD (flat panels) ---------- */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: none;
        justify-content: space-between;
        align-items: flex-start;
        padding: 12px 14px;
        z-index: 10;
        pointer-events: none;
      }
      .hudbox {
        background: #0b1530;
        border: 2px solid #ffd54a;
        border-radius: 8px;
        padding: 7px 13px;
        color: #fff;
      }
      .hudbox .label {
        font-size: 9px;
        letter-spacing: 2px;
        color: #8ea4d6;
        text-transform: uppercase;
        font-weight: 700;
      }
      .hudbox .val {
        font-size: 20px;
        font-weight: 900;
        font-style: italic;
      }
      #lives i {
        color: #ef4444;
        margin-right: 3px;
        font-size: 14px;
      }
      #lives i.lost {
        color: #2a3a5e;
      }
      #levelVal {
        color: #ffd54a;
      }
      #goalsDots {
        display: flex;
        gap: 5px;
        margin-top: 4px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #1a2748;
        border: 1px solid #35488030;
      }
      .dot.on {
        background: #22c55e;
        border-color: #22c55e;
      }

      /* ---------- POWER BAR ---------- */
      #powerWrap {
        position: fixed;
        right: 16px;
        bottom: 18%;
        z-index: 11;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
      }
      #powerBar {
        width: 18px;
        height: 170px;
        background: #0b1530;
        border: 2px solid #fff;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
      }
      #powerFill {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0%;
        background: #22c55e;
      }
      #powerLbl {
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #fff;
      }
      #powerPct {
        font-size: 13px;
        font-weight: 900;
        font-style: italic;
        color: #ffd54a;
      }

      /* ---------- RESULT BANNER ---------- */
      #banner {
        position: fixed;
        top: 32%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        z-index: 15;
        font-size: clamp(46px, 11vw, 92px);
        font-weight: 900;
        font-style: italic;
        letter-spacing: 2px;
        opacity: 0;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }
      #banner.show {
        animation: pop 0.95s cubic-bezier(0.2, 1.6, 0.4, 1) forwards;
      }
      @keyframes pop {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.4);
        }
        25% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.08);
        }
        45% {
          transform: translate(-50%, -50%) scale(1);
        }
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -62%) scale(1);
        }
      }
      .goalTxt {
        color: #ffd54a;
        -webkit-text-stroke: 3px #081024;
      }
      .saveTxt {
        color: #fb923c;
        -webkit-text-stroke: 3px #081024;
      }
      .missTxt {
        color: #ef4444;
        -webkit-text-stroke: 3px #081024;
      }
      .lvlTxt {
        color: #38bdf8;
        -webkit-text-stroke: 3px #081024;
        font-size: clamp(34px, 8vw, 62px);
      }

      #hint {
        position: fixed;
        bottom: 11%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9;
        color: #fff;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 2px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        animation: hintFloat 1.6s ease-in-out infinite;
      }
      #hint i {
        font-size: 24px;
        color: #ffd54a;
      }
      @keyframes hintFloat {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-12px);
        }
      }

      #reticle {
        position: fixed;
        width: 42px;
        height: 42px;
        border: 3px solid #ffd54a;
        border-radius: 6px;
        z-index: 9;
        pointer-events: none;
        display: none;
        transform: translate(-50%, -50%);
      }
      #reticle::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        background: #ffd54a;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }

      #confettiCanvas {
        position: fixed;
        inset: 0;
        z-index: 30;
        pointer-events: none;
      }

      .stats {
        display: flex;
        gap: 14px;
        margin-top: 24px;
      }
      .stat {
        background: #0b1530;
        border: 2px solid #ffd54a;
        border-radius: 8px;
        padding: 14px 20px;
        text-align: center;
        min-width: 88px;
      }
      .stat .n {
        font-size: 27px;
        font-weight: 900;
        font-style: italic;
        color: #ffd54a;
      }
      .stat .l {
        font-size: 9px;
        letter-spacing: 2px;
        color: #8ea4d6;
        text-transform: uppercase;
        font-weight: 700;
        margin-top: 2px;
      }
      #newBest {
        display: none;
        margin-top: 14px;
        color: #22c55e;
        font-weight: 800;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- START MENU -->
    <div id="menu" class="overlay">
      <i class="fa-solid fa-trophy trophy"></i>
      <div class="title">PENALTY<br />SHOOTOUT</div>
      <div class="subtitle">★ World Cup 2026 ★</div>
      <div class="flags">🇺🇸 🇲🇽 🇨🇦 ⚽ 🇧🇷 🇦🇷 🇫🇷</div>
      <button class="btn" id="playBtn">
        <i class="fa-solid fa-futbol"></i>&nbsp; KICK OFF
      </button>
      <div class="howto">
        <div>
          <i class="fa-solid fa-hand-pointer"></i><span>Swipe up to shoot</span>
        </div>
        <div>
          <i class="fa-solid fa-bolt"></i><span>Fast swipe = raw power</span>
        </div>
        <div>
          <i class="fa-solid fa-wind"></i
          ><span>Curve the swipe to bend it</span>
        </div>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="over" class="overlay hidden">
      <i class="fa-solid fa-flag-checkered trophy" style="color: #fff"></i>
      <div class="title" style="font-size: clamp(30px, 7vw, 50px)">
        FULL TIME
      </div>
      <div class="stats">
        <div class="stat">
          <div class="n" id="sGoals">0</div>
          <div class="l">Goals</div>
        </div>
        <div class="stat">
          <div class="n" id="sLevel">1</div>
          <div class="l">Level</div>
        </div>
        <div class="stat">
          <div class="n" id="sScore">0</div>
          <div class="l">Score</div>
        </div>
      </div>
      <div id="newBest">
        <i class="fa-solid fa-star"></i> NEW BEST SCORE
        <i class="fa-solid fa-star"></i>
      </div>
      <button class="btn" id="againBtn">
        <i class="fa-solid fa-rotate-right"></i>&nbsp; PLAY AGAIN
      </button>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hudbox">
        <div class="label"><i class="fa-solid fa-layer-group"></i> Level</div>
        <div class="val" id="levelVal">1</div>
        <div id="goalsDots"></div>
      </div>
      <div class="hudbox" style="text-align: center">
        <div class="label"><i class="fa-solid fa-futbol"></i> Score</div>
        <div class="val" id="scoreVal">0</div>
      </div>
      <div class="hudbox" style="text-align: right">
        <div class="label">Lives</div>
        <div id="lives"></div>
      </div>
    </div>

    <div id="powerWrap">
      <div id="powerPct">0%</div>
      <div id="powerBar"><div id="powerFill"></div></div>
      <div id="powerLbl">PWR</div>
    </div>

    <div id="banner"></div>
    <div id="hint">
      <i class="fa-solid fa-hand-pointer"></i><span>SWIPE UP TO SHOOT</span>
    </div>
    <div id="reticle"></div>
    <canvas id="confettiCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      (function () {
        "use strict";

        /* ================== CONFIG ================== */
        const GOAL_Z = -11,
          GOAL_W = 7.32,
          GOAL_H = 2.44,
          BALL_R = 0.22,
          NET_D = 1.9;
        const GRAV = 9.81,
          GOALS_TO_LEVEL = 3,
          MAX_LIVES = 3;
        const isMobile = Math.min(window.innerWidth, window.innerHeight) < 560;

        /* ================== STATE ================== */
        let state = "menu"; // menu|aim|runup|flight|result|over
        let level = 1,
          score = 0,
          lives = MAX_LIVES,
          goalsInLevel = 0,
          totalGoals = 0,
          streak = 0,
          best = 0;

        const randn = () => Math.random() + Math.random() + Math.random() - 1.5;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const lerp = (a, b, t) => a + (b - a) * t;

        /* ================== AUDIO ================== */
        let actx = null,
          ambGain = null;
        function audio() {
          if (!actx) {
            try {
              actx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {}
          }
          if (actx && actx.state === "suspended") actx.resume();
        }
        function tone(f, t, dur, type, vol, slide) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.type = type || "sine";
          o.frequency.setValueAtTime(f, actx.currentTime + t);
          if (slide)
            o.frequency.exponentialRampToValueAtTime(
              slide,
              actx.currentTime + t + dur,
            );
          g.gain.setValueAtTime(0.0001, actx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(
            vol || 0.2,
            actx.currentTime + t + 0.02,
          );
          g.gain.exponentialRampToValueAtTime(
            0.0001,
            actx.currentTime + t + dur,
          );
          o.connect(g).connect(actx.destination);
          o.start(actx.currentTime + t);
          o.stop(actx.currentTime + t + dur + 0.05);
        }
        function noiseBurst(t, dur, vol, freq) {
          if (!actx) return;
          const len = actx.sampleRate * dur,
            buf = actx.createBuffer(1, len, actx.sampleRate),
            d = buf.getChannelData(0);
          for (let i = 0; i < len; i++)
            d[i] = (Math.random() * 2 - 1) * (1 - i / len);
          const s = actx.createBufferSource();
          s.buffer = buf;
          const f = actx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = freq || 800;
          const g = actx.createGain();
          g.gain.value = vol || 0.3;
          s.connect(f).connect(g).connect(actx.destination);
          s.start(actx.currentTime + t);
        }
        function ambience() {
          if (!actx || ambGain) return;
          const len = actx.sampleRate * 2,
            buf = actx.createBuffer(1, len, actx.sampleRate),
            d = buf.getChannelData(0);
          for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
          const s = actx.createBufferSource();
          s.buffer = buf;
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 420;
          f.Q.value = 0.6;
          ambGain = actx.createGain();
          ambGain.gain.value = 0.035;
          s.connect(f).connect(ambGain).connect(actx.destination);
          s.start();
        }
        const sKick = (p) => {
          noiseBurst(0, 0.1, 0.35 + p * 0.35, 420 + p * 300);
          tone(85, 0, 0.09, "sine", 0.3, 45);
        };
        const sGoal = () => {
          noiseBurst(0, 1.4, 0.3, 1600);
          tone(523, 0, 0.15, "square", 0.11);
          tone(659, 0.15, 0.15, "square", 0.11);
          tone(784, 0.3, 0.32, "square", 0.13);
        };
        const sSave = () => {
          noiseBurst(0, 0.13, 0.4, 320);
          tone(170, 0, 0.18, "sawtooth", 0.11, 80);
        };
        const sMiss = () => {
          tone(290, 0, 0.25, "sawtooth", 0.1, 120);
        };
        const sPing = () => {
          tone(2100, 0, 0.18, "triangle", 0.16, 1500);
          tone(3150, 0, 0.1, "sine", 0.07);
        };
        const sWhistle = () => {
          tone(2200, 0, 0.12, "square", 0.05);
          tone(2200, 0.18, 0.3, "square", 0.05);
        };
        const sLevel = () => {
          [523, 659, 784, 1047].forEach((f, i) =>
            tone(f, i * 0.1, 0.18, "triangle", 0.13),
          );
        };
        const sSteps = () => {
          for (let i = 0; i < 3; i++) noiseBurst(i * 0.12, 0.05, 0.12, 300);
        };

        /* ================== RENDERER ================== */
        const container = document.getElementById("game");
        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          powerPreference: "high-performance",
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.12;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x070d22);
        scene.fog = new THREE.Fog(0x0a1430, 38, 110);

        const camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          300,
        );
        const CAM_HOME = new THREE.Vector3(0, 2.0, 4.9);
        const LOOK_HOME = new THREE.Vector3(0, 1.25, GOAL_Z);
        const lookCur = LOOK_HOME.clone();
        camera.position.copy(CAM_HOME);
        camera.lookAt(LOOK_HOME);
        let shake = 0;

        /* ================== LIGHTS ================== */
        scene.add(new THREE.HemisphereLight(0x9db8ff, 0x10240f, 0.55));
        const sun = new THREE.DirectionalLight(0xfff3da, 1.5);
        sun.position.set(-14, 26, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
        sun.shadow.camera.left = -16;
        sun.shadow.camera.right = 16;
        sun.shadow.camera.top = 16;
        sun.shadow.camera.bottom = -16;
        sun.shadow.camera.far = 80;
        sun.shadow.bias = -0.0005;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
        fill.position.set(14, 12, -6);
        scene.add(fill);

        /* ================== TEX HELPERS ================== */
        function cTex(c) {
          const t = new THREE.CanvasTexture(c);
          t.encoding = THREE.sRGBEncoding;
          t.anisotropy = renderer.capabilities.getMaxAnisotropy();
          return t;
        }

        /* ================== PITCH ================== */
        (function () {
          const c = document.createElement("canvas");
          c.width = 1024;
          c.height = 1024;
          const g = c.getContext("2d");
          for (let i = 0; i < 16; i++) {
            g.fillStyle = i % 2 ? "#2f7c3a" : "#286c33";
            g.fillRect(0, i * 64, 1024, 64);
          }
          // grass grain
          for (let i = 0; i < 14000; i++) {
            g.fillStyle =
              "rgba(" +
              ((20 + Math.random() * 40) | 0) +
              "," +
              ((90 + Math.random() * 70) | 0) +
              "," +
              ((30 + Math.random() * 30) | 0) +
              ",0.25)";
            g.fillRect(Math.random() * 1024, Math.random() * 1024, 2, 2);
          }
          const t = cTex(c);
          t.wrapS = t.wrapT = THREE.RepeatWrapping;
          t.repeat.set(3, 3);
          const p = new THREE.Mesh(
            new THREE.PlaneGeometry(110, 110),
            new THREE.MeshStandardMaterial({ map: t, roughness: 0.95 }),
          );
          p.rotation.x = -Math.PI / 2;
          p.receiveShadow = true;
          scene.add(p);
        })();
        // pitch lines
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xe8e8e8 });
        function strip(w, d, x, z) {
          const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), lineMat);
          m.rotation.x = -Math.PI / 2;
          m.position.set(x, 0.012, z);
          scene.add(m);
        }
        strip(GOAL_W + 11, 0.12, 0, GOAL_Z);
        strip(0.12, 5.5, -(GOAL_W / 2 + 5.5), GOAL_Z + 2.75);
        strip(0.12, 5.5, GOAL_W / 2 + 5.5, GOAL_Z + 2.75);
        strip(GOAL_W + 11, 0.12, 0, GOAL_Z + 5.5);
        (function () {
          const m = new THREE.Mesh(new THREE.CircleGeometry(0.13, 24), lineMat);
          m.rotation.x = -Math.PI / 2;
          m.position.set(0, 0.013, 0);
          scene.add(m);
        })();
        (function () {
          const m = new THREE.Mesh(
            new THREE.RingGeometry(
              3.0,
              3.12,
              48,
              1,
              Math.PI * 1.18,
              Math.PI * 0.64,
            ),
            lineMat,
          );
          m.rotation.x = -Math.PI / 2;
          m.position.set(0, 0.013, 0);
          scene.add(m);
        })();
        // worn dirt around spot
        (function () {
          const m = new THREE.Mesh(
            new THREE.CircleGeometry(0.8, 24),
            new THREE.MeshStandardMaterial({
              color: 0x4d6b2e,
              roughness: 1,
              transparent: true,
              opacity: 0.5,
            }),
          );
          m.rotation.x = -Math.PI / 2;
          m.position.set(0, 0.011, 0);
          scene.add(m);
        })();

        /* ================== GOAL FRAME ================== */
        const postMat = new THREE.MeshStandardMaterial({
          color: 0xf5f5f5,
          roughness: 0.25,
          metalness: 0.15,
        });
        function postAt(x) {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.062, 0.062, GOAL_H, 16),
            postMat,
          );
          m.position.set(x, GOAL_H / 2, GOAL_Z);
          m.castShadow = true;
          scene.add(m);
        }
        postAt(-GOAL_W / 2);
        postAt(GOAL_W / 2);
        (function () {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.062, 0.062, GOAL_W + 0.124, 16),
            postMat,
          );
          m.rotation.z = Math.PI / 2;

        function ballTexture() {
          const c = document.createElement("canvas");

          g.fillStyle = "#fafafa";
          g.fillRect(0, 0, 512, 512);
          // Telstar-style triad accents
          function tri(x, y, s, rot, col) {
            g.save();
            g.translate(x, y);
            g.rotate(rot);
            g.fillStyle = col;
            g.beginPath();
            for (let k = 0; k < 3; k++) {
              const a = (k / 3) * Math.PI * 2 - Math.PI / 2;
              const px = Math.cos(a) * s,
                py = Math.sin(a) * s;
              k ? g.lineTo(px, py) : g.moveTo(px, py);
              const a2 = a + Math.PI / 3;
              g.quadraticCurveTo(
                Math.cos(a2) * s * 0.55,
                Math.sin(a2) * s * 0.55,
                Math.cos(a + (2 * Math.PI) / 3) * s,
                Math.sin(a + (2 * Math.PI) / 3) * s,
              );
            }
            g.closePath();
            g.fill();
            g.restore();
          }
          for (let i = 0; i < 7; i++)
            for (let j = 0; j < 4; j++) {
              const x = i * 78 + (j % 2 ? 39 : 0),
                y = j * 128 + 64;
              tri(x, y, 34, (i + j) * 0.8, "#16181d");
              tri(x, y, 16, (i + j) * 0.8 + 0.4, "#c9a227");
            }
          return cTex(c);

        /* ================== GOALKEEPER ================== */
        const K = makePlayer(0xd9ff2e, "1", 0x16181d, 0xc68642);

        function planDive(tx, ty, T) {
          const acc = Math.min(0.34 + level * 0.07, 0.95);
          let gx, gy;
          if (Math.random() < acc) {
            const err = (1 - acc) * 2.4;
            gx = tx + randn() * err;
            gy = ty + randn() * err * 0.55;
          } else {
            gx =
              -(Math.sign(tx) || (Math.random() < 0.5 ? 1 : -1)) *
              (1.1 + Math.random() * 1.7);
            gy = 0.6 + Math.random() * 1.1;

          gx = clamp(gx, -3.3, 3.3);
          gy = clamp(gy, 0.3, 2.3);
          dive.active = true;
          dive.t = 0;
          dive.delay = Math.max(0.04, 0.27 - level * 0.02);
          dive.dur = clamp(T - dive.delay, 0.26, 0.62);

          dive.gy = gy;
          dive.rot =

            clamp(Math.abs(gx) * 0.42 + (gy > 1.5 ? 0.45 : 0.08), 0.15, 1.35);
          dive.jump = Math.max(0, gy - 1.1) * 0.85;
        }
        function diveProgress() {
          if (!dive.active) return 0;
          return clamp((dive.t - dive.delay) / dive.dur, 0, 1);
        }
        function poseDive() {
          const e = 1 - Math.pow(1 - diveProgress(), 3);
          keeper.position.x = lerp(keeperBase.x, dive.gx * 0.8, e);

          K.armL.rotation.x = lerp(0.35, 0, e);
          K.armR.rotation.x = lerp(0.35, 0, e);
          K.hipL.rotation.z = lerp(0.12, s * 0.55, e);
          K.hipR.rotation.z = lerp(-0.12, s * 0.85, e);

            S.armR.rotation.x = sw * 0.8;

            striker.position.copy(ST_STANCE);

            // backswing then strike through
            const sw =
              k < 0.3
                ? lerp(0.4, 1.05, k / 0.3)
                : lerp(1.05, -1.55, (k - 0.3) / 0.7);
            S.hipR.rotation.x = sw;
            S.armL.rotation.x = lerp(-0.6, 0.5, k);
            S.armR.rotation.x = lerp(0.6, -0.7, k);
            S.torso.rotation.x = lerp(0.18, -0.12, k);
            striker.rotation.z = lerp(0, 0.12, k);

        }

        /* ================== INPUT / AIM ================== */
        const reticle = document.getElementById("reticle");
        const powerWrap = document.getElementById("powerWrap");
        const powerFill = document.getElementById("powerFill");
        const powerPct = document.getElementById("powerPct");
        let dragging = false;
        const drag = {
          x0: 0,

        const ptr = (e) => {
          const t = e.touches
            ? e.touches[0]
            : e.changedTouches
              ? e.changedTouches[0]
              : e;
          return { x: t.clientX, y: t.clientY };
        };

        function swipe() {
          const w = window.innerWidth,
            h = window.innerHeight;
          const dx = (drag.x - drag.x0) / w,
            dy = (drag.y0 - drag.y) / h;
          const tx = clamp(dx * 13, -5.2, 5.2);
          const ty = clamp(0.2 + dy * 5.0, 0.16, 3.6);
          const elapsed = Math.max(50, performance.now() - drag.t0);
          const speed =
            Math.hypot(drag.x - drag.x0, drag.y0 - drag.y) / elapsed; // px/ms
          const pw = clamp(dy * 1.25 + speed * 0.2, 0, 1);
          // curl: how far the path mid-point bowed sideways
          const midExp = (drag.x0 + drag.x) / 2;
          const curl = drag.midSet
            ? clamp(((drag.midX - midExp) / w) * -26, -6, 6)
            : 0;
          return { tx, ty, dy, pw, curl };
        }
        function projToScreen(x, y, z) {
          const v = new THREE.Vector3(x, y, z).project(camera);
          return {
            x: (v.x * 0.5 + 0.5) * window.innerWidth,
            y: (-v.y * 0.5 + 0.5) * window.innerHeight,
          };
        }
        function setPowerUI(p) {
          powerFill.style.height = p * 100 + "%";
          powerFill.style.background =
            p < 0.45 ? "#22c55e" : p < 0.75 ? "#eab308" : "#ef4444";
          powerPct.textContent = Math.round(p * 100) + "%";
        }
        function onDown(e) {
          audio();
          ambience();
          if (state !== "aim") return;
          const p = ptr(e);
          dragging = true;
          drag.x0 = drag.x = p.x;
          drag.y0 = drag.y = p.y;
          drag.t0 = performance.now();
          drag.midSet = false;
          document.getElementById("hint").style.display = "none";
          powerWrap.style.display = "flex";
          setPowerUI(0);
        }
        function onMove(e) {
          if (!dragging || state !== "aim") return;
          const p = ptr(e);
          drag.x = p.x;
          drag.y = p.y;
          const s = swipe();
          if (!drag.midSet && s.dy > 0.12) {
            drag.midX = p.x;
            drag.midSet = true;
          }
          setPowerUI(s.pw);
          if (s.dy > 0.02) {
            const sc = projToScreen(s.tx, s.ty, GOAL_Z);
            reticle.style.display = "block";
            reticle.style.left = sc.x + "px";
            reticle.style.top = sc.y + "px";
          } else reticle.style.display = "none";
          if (e.cancelable) e.preventDefault();
        }
        function onUp() {
          if (!dragging) return;
          dragging = false;
          reticle.style.display = "none";
          if (state !== "aim") {
            powerWrap.style.display = "none";
            return;
          }
          const s = swipe();
          if (s.dy < 0.06 || s.pw < 0.08) {
            powerWrap.style.display = "none";
            return;
          }
          beginRunup(s.tx, s.ty, Math.max(0.18, s.pw), s.curl);
        }
        container.addEventListener("mousedown", onDown);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
        container.addEventListener("touchstart", onDown, { passive: true });
        window.addEventListener("touchmove", onMove, { passive: false });
        window.addEventListener("touchend", onUp);

        /* ================== SHOT SOLVER ================== */
        const phys = {
          v: new THREE.Vector3(),
          ax: 0,
          active: false,
          time: 0,
          netTime: 0,
          scored: false,
          touched: false,
          postHit: false,
          pw: 0,
          T: 0.6,
        };
        const acc3 = new THREE.Vector3();

        function beginRunup(tx, ty, pw, curl) {
          state = "runup";
          run.on = true;
          run.t = 0;
          launched = false;
          pendingShot = { tx, ty, pw, curl };
          sSteps();
          setTimeout(() => {
            powerWrap.style.display = "none";
          }, 500);
        }
        function launchBall() {
          const { tx, ty, pw, curl } = pendingShot;
          // power scatter: hard shots spray more
          const err = pw * pw * 0.7;
          const TX = clamp(tx + randn() * err, -5.4, 5.4);
          const TY = clamp(ty + randn() * err * 0.55, 0.14, 3.7);
          const v0 = 12.5 + pw * 17; // 12.5 → 29.5 m/s
          const p0 = ball.position;
          const dHor = Math.hypot(TX - p0.x, GOAL_Z - p0.z);
          const T = dHor / v0;
          phys.ax = curl; // Magnus lateral accel
          phys.v.set(
            (TX - p0.x) / T - 0.5 * curl * T, // compensate curve so it still arrives
            (TY - p0.y) / T + 0.5 * GRAV * T,
            (GOAL_Z - p0.z) / T,
          );
          phys.active = true;
          phys.time = 0;
          phys.netTime = 0;
          phys.scored = false;
          phys.touched = false;
          phys.postHit = false;
          phys.pw = pw;
          phys.T = T;
          planDive(TX, TY, T);
          sKick(pw);
          shake = 0.12 + pw * 0.2;
          state = "flight";
        }

        /* ================== PHYSICS ================== */
        const kSpheres = []; // refreshed every frame
        const tmpV = new THREE.Vector3();
        function refreshKeeperSpheres() {
          kSpheres.length = 0;
          K.handL.getWorldPosition(tmpV);
          kSpheres.push({ x: tmpV.x, y: tmpV.y, z: tmpV.z, r: 0.17 });
          K.handR.getWorldPosition(tmpV);
          kSpheres.push({ x: tmpV.x, y: tmpV.y, z: tmpV.z, r: 0.17 });
          K.head.getWorldPosition(tmpV);
          kSpheres.push({ x: tmpV.x, y: tmpV.y, z: tmpV.z, r: 0.2 });
          K.torso.getWorldPosition(tmpV);
          kSpheres.push({ x: tmpV.x, y: tmpV.y, z: tmpV.z, r: 0.4 });
          // guaranteed-reach sphere grows along the dive (keeps difficulty honest)
          const e = diveProgress();
          if (dive.active && e > 0.05) {
            kSpheres.push({
              x: lerp(keeperBase.x, dive.gx, e),
              y: lerp(1.35, dive.gy, e),
              z: keeperBase.z,
              r: 0.05 + e * 0.3,
            });
          }
        }
        let pingDone = false;
        function hitPost() {
          phys.postHit = true;
          if (!pingDone) {
            sPing();
            shake = Math.max(shake, 0.25);
            pingDone = true;
          }
        }

        function physStep(h) {
          const p = ball.position,
            v = phys.v;
          const prevZ = p.z,
            prevX = p.x,
            prevY = p.y;

          acc3.set(phys.ax, -GRAV, 0);
          v.addScaledVector(acc3, h);
          // mild air drag
          v.multiplyScalar(Math.exp(-0.012 * h * v.length()));
          p.addScaledVector(v, h);

          // ---- goal-line crossing ----
          if (!phys.scored && prevZ > GOAL_Z && p.z <= GOAL_Z) {
            const f = (prevZ - GOAL_Z) / Math.max(1e-6, prevZ - p.z);
            const ix = lerp(prevX, p.x, f),
              iy = lerp(prevY, p.y, f);
            if (Math.abs(ix) < GOAL_W / 2 - 0.05 && iy < GOAL_H - 0.03)
              phys.scored = true;
          }

          // ---- posts & crossbar ----
          const R = BALL_R + 0.062;
          for (const px of [-GOAL_W / 2, GOAL_W / 2]) {
            if (p.y < GOAL_H + 0.12) {
              const dx = p.x - px,
                dz = p.z - GOAL_Z,
                d = Math.hypot(dx, dz);
              if (d < R && d > 1e-4) {
                const nx = dx / d,
                  nz = dz / d;
                p.x = px + nx * R;
                p.z = GOAL_Z + nz * R;
                const dot = v.x * nx + v.z * nz;
                if (dot < 0) {
                  v.x -= 2 * dot * nx;
                  v.z -= 2 * dot * nz;
                  v.x *= 0.74;
                  v.z *= 0.74;
                  hitPost();
                }
              }
            }
          }
          if (Math.abs(p.x) < GOAL_W / 2 + 0.07) {
            const dy = p.y - GOAL_H,
              dz = p.z - GOAL_Z,
              d = Math.hypot(dy, dz);
            if (d < R && d > 1e-4) {
              const ny = dy / d,
                nz = dz / d;
              p.y = GOAL_H + ny * R;
              p.z = GOAL_Z + nz * R;
              const dot = v.y * ny + v.z * nz;
              if (dot < 0) {
                v.y -= 2 * dot * ny;
                v.z -= 2 * dot * nz;
                v.y *= 0.74;
                v.z *= 0.74;
                hitPost();
              }
            }
          }

          // ---- keeper collision ----
          if (p.z < GOAL_Z + 4 && p.z > GOAL_Z - 1.5) {
            for (const s of kSpheres) {
              const dx = p.x - s.x,
                dy = p.y - s.y,
                dz = p.z - s.z;
              const d = Math.sqrt(dx * dx + dy * dy + dz * dz),
                rr = BALL_R + s.r;
              if (d < rr && d > 1e-4) {
                const nx = dx / d,
                  ny = dy / d,
                  nz = dz / d;
                p.x = s.x + nx * rr;
                p.y = s.y + ny * rr;
                p.z = s.z + nz * rr;
                const dot = v.x * nx + v.y * ny + v.z * nz;
                if (dot < 0) {
                  v.x -= 2 * dot * nx;
                  v.y -= 2 * dot * ny;
                  v.z -= 2 * dot * nz;
                  v.multiplyScalar(0.42);
                  // most parries push out — occasionally spill toward goal
                  if (v.z < 1.2 && Math.random() < 0.85)
                    v.z = 1.2 + Math.random() * 3;
                  v.y = Math.max(v.y, 0.4);
                  phys.touched = true;
                  if (!phys.touchSnd) {
                    sSave();
                    phys.touchSnd = true;
                  }
                }
              }
            }
          }

          // ---- net containment ----
          if (phys.scored) {
            phys.netTime += h;
            const zMin = GOAL_Z - NET_D + BALL_R + 0.08;
            if (p.z < zMin) {
              p.z = zMin;
              v.z = Math.abs(v.z) * 0.18;
              netPunch = 1;
            }
            const xMax = GOAL_W / 2 - BALL_R - 0.04;
            if (Math.abs(p.x) > xMax) {
              p.x = Math.sign(p.x) * xMax;
              v.x *= -0.25;
              netPunch = Math.max(netPunch, 0.6);
            }
            if (p.y > GOAL_H - BALL_R && p.z < GOAL_Z - 0.05) {
              p.y = GOAL_H - BALL_R;
              v.y *= -0.25;
            }
            v.multiplyScalar(Math.exp(-5.5 * h));
          }

          // ---- ground ----
          if (p.y < BALL_R) {
            p.y = BALL_R;
            if (v.y < 0) v.y = -v.y * 0.5;
            if (Math.abs(v.y) < 0.6) v.y = 0;
            v.x *= Math.exp(-1.8 * h * (v.y === 0 ? 1.6 : 0.4));
            v.z *= Math.exp(-1.8 * h * (v.y === 0 ? 1.6 : 0.4));
          }
        }

        function finalizeCheck() {
          const p = ball.position,
            sp = phys.v.length();
          if (phys.time > 3.6) return true;
          if (phys.scored && phys.netTime > 0.85) return true;
          if (p.z < GOAL_Z - 3.4) return true;
          if (sp < 0.5 && phys.time > 1.1) return true;
          if (Math.abs(p.x) > 14 || p.z > 6) return true;
          return false;
        }

        /* ================== OUTCOME ================== */
        const bannerEl = document.getElementById("banner");
        function banner(html, cls) {
          bannerEl.className = "";
          bannerEl.innerHTML = '<span class="' + cls + '">' + html + "</span>";
          void bannerEl.offsetWidth;
          bannerEl.classList.add("show");
        }
        /* ---- built-in confetti engine (zero dependencies) ---- */
        const cfCanvas = document.getElementById("confettiCanvas");
        const cfCtx = cfCanvas.getContext("2d");
        const cfParts = [];
        let cfRunning = false,
          cfLast = 0;
        function cfSize() {
          cfCanvas.width = window.innerWidth;
          cfCanvas.height = window.innerHeight;
        }
        cfSize();
        window.addEventListener("resize", cfSize);
        const CF_COLS = [
          "#ffd54a",
          "#ffffff",
          "#22c55e",
          "#3b82f6",
          "#ef4444",
          "#f97316",
        ];
        function cfBurst(ox, oy, n, angleDeg, spreadDeg, vel) {
          const W = cfCanvas.width,
            H = cfCanvas.height;
          for (let i = 0; i < n; i++) {
            const a =
              ((angleDeg + (Math.random() - 0.5) * spreadDeg) * Math.PI) / 180;
            const v = vel * (0.5 + Math.random() * 0.7);
            cfParts.push({
              x: ox * W,
              y: oy * H,
              vx: Math.cos(a) * v,
              vy: -Math.sin(a) * v,
              s: 5 + Math.random() * 6,
              c: CF_COLS[(Math.random() * CF_COLS.length) | 0],
              r: Math.random() * Math.PI * 2,
              vr: (Math.random() - 0.5) * 12,
              life: 1,
              decay: 0.25 + Math.random() * 0.25,
              wob: Math.random() * Math.PI * 2,
            });
          }
          if (!cfRunning) {
            cfRunning = true;
            cfLast = performance.now();
            requestAnimationFrame(cfTick);
          }
        }
        function cfTick(now) {
          const dt = Math.min(0.04, (now - cfLast) / 1000);
          cfLast = now;
          cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
          for (let i = cfParts.length - 1; i >= 0; i--) {
            const p = cfParts[i];
            p.vy += 1500 * dt; // gravity
            p.vx *= Math.exp(-0.6 * dt); // air drag
            p.vy *= Math.exp(-0.4 * dt);
            p.wob += dt * 8;
            p.x += p.vx * dt + Math.sin(p.wob) * 30 * dt; // flutter
            p.y += p.vy * dt;
            p.r += p.vr * dt;
            p.life -= p.decay * dt;
            if (p.life <= 0 || p.y > cfCanvas.height + 30) {
              cfParts.splice(i, 1);
              continue;
            }
            cfCtx.save();
            cfCtx.globalAlpha = Math.min(1, p.life * 2);
            cfCtx.translate(p.x, p.y);
            cfCtx.rotate(p.r);
            cfCtx.fillStyle = p.c;
            cfCtx.fillRect(
              -p.s / 2,
              -p.s / 2,
              p.s,
              p.s * 0.62 * (0.4 + Math.abs(Math.sin(p.wob))),
            );
            cfCtx.restore();
          }
          if (cfParts.length) requestAnimationFrame(cfTick);
          else {
            cfRunning = false;
            cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
          }
        }
        function fireConfetti() {
          cfBurst(0.5, 0.55, 130, 90, 75, 820);
          setTimeout(() => cfBurst(0.02, 0.72, 80, 60, 55, 780), 170);
          setTimeout(() => cfBurst(0.98, 0.72, 80, 120, 55, 780), 330);
        }
        function updateHUD() {
          document.getElementById("levelVal").textContent = level;
          document.getElementById("scoreVal").textContent = score;
          const lv = document.getElementById("lives");
          lv.innerHTML = "";
          for (let i = 0; i < MAX_LIVES; i++)
            lv.innerHTML +=
              '<i class="fa-solid fa-heart' +
              (i < lives ? "" : " lost") +
              '"></i>';
          const gd = document.getElementById("goalsDots");
          gd.innerHTML = "";
          for (let i = 0; i < GOALS_TO_LEVEL; i++)
            gd.innerHTML +=
              '<div class="dot' + (i < goalsInLevel ? " on" : "") + '"></div>';
        }
        function resolve() {
          state = "result";
          phys.active = false;
          let o;
          if (phys.scored) o = "goal";
          else if (phys.touched) o = "save";
          else if (phys.postHit) o = "post";
          else o = "miss";

          if (o === "goal") {
            streak++;
            totalGoals++;
            goalsInLevel++;
            score += Math.round((80 + phys.pw * 60) * level) + streak * 25;
            sGoal();
            fireConfetti();
            banner(phys.touched ? "DEFLECTED IN!" : "GOAL!", "goalTxt");
          } else if (o === "save") {
            streak = 0;
            lives--;
            banner("SAVED!", "saveTxt");
          } else if (o === "post") {
            streak = 0;
            lives--;
            sMiss();
            banner("OFF THE WOODWORK!", "missTxt");
          } else {
            streak = 0;
            lives--;
            sMiss();
            banner(
              Math.abs(ball.position.x) > GOAL_W / 2
                ? "WIDE!"
                : "OVER THE BAR!",
              "missTxt",
            );
          }
          updateHUD();
          setTimeout(() => {
            if (lives <= 0) {
              gameOver();
              return;
            }
            if (goalsInLevel >= GOALS_TO_LEVEL) {
              level++;
              goalsInLevel = 0;
              score += 250;
              sLevel();
              updateHUD();
              banner(
                "LEVEL " +
                  level +
                  ' <i class="fa-solid fa-arrow-trend-up"></i>',
                "lvlTxt",
              );
              setTimeout(nextKick, 1100);
            } else nextKick();
          }, 1600);
        }

        function nextKick() {
          resetBall();
          keeperIdle();
          dive.active = false;
          run.on = false;
          run.t = 0;
          phys.active = false;
          phys.touchSnd = false;
          pingDone = false;
          striker.position.copy(ST_START);
          state = "aim";
          document.getElementById("hint").style.display =
            totalGoals < 1 ? "flex" : "none";
        }
        function gameOver() {
          state = "over";
          sWhistle();
          document.getElementById("sGoals").textContent = totalGoals;
          document.getElementById("sLevel").textContent = level;
          document.getElementById("sScore").textContent = score;
          const nb = score > best && best > 0;
          if (score > best) best = score;
          document.getElementById("newBest").style.display = nb
            ? "block"
            : "none";
          setTimeout(
            () => document.getElementById("over").classList.remove("hidden"),
            650,
          );
        }
        function startGame() {
          level = 1;
          score = 0;
          lives = MAX_LIVES;
          goalsInLevel = 0;
          totalGoals = 0;
          streak = 0;
          document.getElementById("menu").classList.add("hidden");
          document.getElementById("over").classList.add("hidden");
          document.getElementById("hud").style.display = "flex";
          updateHUD();
          sWhistle();
          nextKick();
        }
        document.getElementById("playBtn").addEventListener("click", () => {
          audio();
          ambience();
          startGame();
        });
        document.getElementById("againBtn").addEventListener("click", () => {
          audio();
          startGame();
        });

        /* ================== MAIN LOOP ================== */
        const clock = new THREE.Clock();
        const FIXED = 1 / 240;
        let physAcc = 0;

        function animate() {
          requestAnimationFrame(animate);
          const dt = Math.min(0.05, clock.getDelta());
          const time = clock.elapsedTime;

          // keeper
          if (dive.active) {
            dive.t += dt;
            poseDive();
          } else if (state === "aim" || state === "runup" || state === "menu") {
            keeper.position.x = keeperBase.x + Math.sin(time * 1.5) * 0.5;
            keeper.position.y = Math.abs(Math.sin(time * 3.6)) * 0.045;
            K.armL.rotation.z = 0.55 + Math.sin(time * 2) * 0.06;
            K.armR.rotation.z = -0.55 - Math.sin(time * 2) * 0.06;
          }

          // striker
          if (run.on) {
            run.t += dt;
            poseStriker();
            if (!launched && run.t >= CONTACT_T) {
              launched = true;
              launchBall();
            }
            if (run.t >= END_T + 0.5) run.on = false;
          } else if (state === "aim" || state === "menu") {
            strikerIdle(time);
          }

          // ball physics
          if (phys.active) {
            refreshKeeperSpheres();
            phys.time += dt;
            physAcc += dt;
            while (physAcc >= FIXED) {
              physStep(FIXED);
              physAcc -= FIXED;
            }
            // visual spin
            const sp = phys.v.length();
            ball.rotation.x -=
              ((sp * dt * (phys.v.z < 0 ? 2.2 : -2.2)) /
                (2 * Math.PI * BALL_R)) *
              0.4;
            ball.rotation.y += phys.ax * dt * 0.6;
            if (finalizeCheck()) resolve();
          }

          // contact shadow blob
          blob.position.set(ball.position.x, 0.014, ball.position.z);
          const hgt = clamp(ball.position.y / 3, 0, 1);
          blob.material.opacity = 0.85 * (1 - hgt);
          blob.scale.setScalar(1 + hgt * 1.6);

          // net punch
          if (netPunch > 0) {
            netPunch = Math.max(0, netPunch - dt * 2.2);
            const k = Math.sin(netPunch * Math.PI) * 0.3;
            backNet.position.z = GOAL_Z - (0.6 + NET_D) / 2 - k;
          }

          // camera: cinematic follow + shake
          let cz = CAM_HOME.z,
            lookT = LOOK_HOME;
          if (state === "flight") {
            const prog = clamp(phys.time / Math.max(0.3, phys.T), 0, 1);
            cz = CAM_HOME.z - prog * 1.3;
            lookCur.lerp(
              new THREE.Vector3(
                ball.position.x * 0.35,
                lerp(1.25, ball.position.y * 0.6 + 0.6, 0.5),
                GOAL_Z,
              ),
              Math.min(1, dt * 6),
            );
          } else {
            lookCur.lerp(LOOK_HOME, Math.min(1, dt * 4));
          }
          camera.position.x = lerp(camera.position.x, 0, Math.min(1, dt * 4));
          camera.position.z = lerp(camera.position.z, cz, Math.min(1, dt * 5));
          camera.position.y = CAM_HOME.y;
          if (shake > 0) {
            shake = Math.max(0, shake - dt * 1.4);
            camera.position.x += (Math.random() - 0.5) * shake * 0.18;
            camera.position.y += (Math.random() - 0.5) * shake * 0.14;
          }
          camera.lookAt(lookCur);

          renderer.render(scene, camera);
        }
        animate();

        /* ================== RESIZE ================== */
        function onResize() {
          const w = window.innerWidth,
            h = window.innerHeight;
          camera.aspect = w / h;
          camera.fov = w / h < 0.75 ? 76 : 60;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }
        window.addEventListener("resize", onResize);
        onResize();
      })();
    </script>
  </body>
</html>
